<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>請說出你的願望</title>
    <!-- Google Fonts 引入美型繁體字體 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght=400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #FDFBF7;
            --cream-light: #F7F3EB;
            --cream-dark: #EADBC8;
            --brown-text: #4A3E3D;
            --brown-accent: #8C786E;
            --white: #FFFFFF;
            --gold: #C5A880;
            --sage: #A39389;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Noto Serif TC', serif, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--brown-text);
            line-height: 1.8;
            padding: 20px 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 700px;
            background: var(--white);
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 10px 30px rgba(140, 120, 110, 0.08);
            border: 1px solid var(--cream-light);
        }

        header {
            text-align: center;
            margin-bottom: 35px;
        }

        header h1 {
            font-size: 1.8rem;
            color: var(--brown-text);
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        header p {
            font-size: 0.9rem;
            color: var(--brown-accent);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-row {
            display: flex;
            gap: 15px;
        }

        .form-row .form-group {
            flex: 1;
        }

        label {
            display: block;
            font-size: 0.85rem;
            margin-bottom: 8px;
            font-weight: bold;
            color: var(--brown-accent);
        }

        input[type="text"], input[type="date"], select, textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--cream-dark);
            border-radius: 12px;
            background-color: var(--bg-color);
            color: var(--brown-text);
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--brown-accent);
            box-shadow: 0 0 0 3px rgba(140, 120, 110, 0.15);
        }

        textarea {
            resize: none;
            height: 90px;
        }

        .quick-btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 8px;
        }

        .tag-btn {
            background-color: var(--cream-light);
            border: 1px solid transparent;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            color: var(--brown-text);
            transition: all 0.2s;
        }

        .tag-btn.active, .tag-btn:hover {
            background-color: var(--brown-accent);
            color: var(--white);
        }

        .submit-btn {
            width: 100%;
            background-color: var(--brown-accent);
            color: var(--white);
            border: none;
            padding: 16px;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 2px;
            margin-top: 15px;
            transition: background 0.3s ease;
        }

        .submit-btn:hover {
            background-color: #766359;
        }

        /* 儀式感抽卡互動區 */
        .ritual-section {
            display: none;
            text-align: center;
            margin-top: 30px;
            padding: 30px 20px;
            background: var(--cream-light);
            border-radius: 16px;
            border: 1px dashed var(--brown-accent);
        }

        .ritual-title {
            font-size: 1.05rem;
            color: var(--brown-text);
            margin-bottom: 15px;
            letter-spacing: 1px;
            line-height: 1.6;
        }

        .card-deck {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 30px 0;
            perspective: 1000px;
        }

        .ritual-card {
            width: 80px;
            height: 135px;
            background: linear-gradient(135deg, #4A3E3D 0%, #2A201F 100%);
            border: 2px solid var(--gold);
            border-radius: 10px;
            cursor: pointer;
            position: relative;
            box-shadow: 0 6px 15px rgba(0,0,0,0.18);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ritual-card::before {
            content: "🔱";
            color: var(--gold);
            font-size: 1.3rem;
            opacity: 0.8;
        }

        .ritual-card:hover {
            transform: translateY(-15px) rotate(3deg) scale(1.05);
            box-shadow: 0 15px 25px rgba(197, 168, 128, 0.45);
            border-color: var(--white);
        }

        .shuffling-text {
            font-size: 0.85rem;
            color: var(--brown-accent);
            font-style: italic;
            letter-spacing: 1px;
        }

        /* 預測結果區塊 */
        .result-section {
            display: none;
            margin-top: 40px;
            padding-top: 30px;
            border-top: 2px dashed var(--cream-dark);
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-title {
            text-align: center;
            font-size: 1.35rem;
            margin-bottom: 25px;
            color: var(--brown-text);
            letter-spacing: 2px;
        }

        /* 偉特牌實體視覺化 */
        .waite-tarot-display {
            width: 140px;
            height: 235px;
            background: #2A201F;
            border: 4px solid var(--gold);
            border-radius: 12px;
            margin: 0 auto 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 12px;
            color: var(--cream-light);
            position: relative;
            overflow: hidden;
            transition: transform 0.5s ease;
        }

        .waite-tarot-display.reversed {
            transform: rotate(180deg);
        }

        .waite-tarot-display.reversed .card-name-text {
            transform: rotate(180deg);
        }

        .tarot-corner {
            font-size: 0.75rem;
            color: var(--gold);
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
        }

        .tarot-center-art {
            font-size: 3.2rem;
            text-align: center;
            opacity: 0.95;
            margin: auto 0;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5));
        }

        .card-name-text {
            text-align: center;
            font-size: 0.85rem;
            font-weight: bold;
            letter-spacing: 2px;
            color: var(--gold);
            border-top: 1px solid rgba(197, 168, 128, 0.35);
            padding-top: 6px;
        }

        .divination-card {
            background: var(--cream-light);
            border-radius: 18px;
            padding: 26px;
            margin-bottom: 22px;
            border: 1px solid rgba(140, 120, 110, 0.05);
        }

        .card-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 18px;
        }

        .tarot-badge { background: var(--brown-accent); color: var(--white); padding: 4px 12px; border-radius: 6px; font-size: 0.75rem; font-weight: bold;}
        .ziwei-badge { background: var(--sage); color: var(--white); padding: 4px 12px; border-radius: 6px; font-size: 0.75rem; font-weight: bold;}
        .numerology-badge { background: var(--gold); color: var(--brown-text); padding: 4px 12px; border-radius: 6px; font-size: 0.75rem; font-weight: bold;}

        /* 細部深度解盤排版 */
        .analysis-block {
            margin-bottom: 20px;
            text-align: justify;
        }

        .analysis-subtitle {
            font-weight: bold;
            color: var(--brown-text);
            margin-bottom: 6px;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .analysis-text {
            font-size: 0.95rem;
            color: #5A4E4D;
            padding-left: 20px;
            border-left: 2px solid var(--cream-dark);
        }

        /* 三維度詳細建議方框 */
        .advice-box {
            background: #F4EFE6;
            border-radius: 14px;
            padding: 20px;
            margin-top: 20px;
        }

        .advice-title {
            font-size: 1rem;
            font-weight: bold;
            color: var(--brown-text);
            margin-bottom: 15px;
            border-bottom: 1px dashed var(--brown-accent);
            padding-bottom: 6px;
        }

        .advice-item {
            margin-bottom: 15px;
        }

        .advice-item:last-child {
            margin-bottom: 0;
        }

        .advice-item-title {
            font-weight: bold;
            font-size: 0.9rem;
            color: var(--brown-accent);
            margin-bottom: 4px;
        }

        .advice-item-text {
            font-size: 0.9rem;
            color: var(--brown-text);
        }

        @media (max-width: 480px) {
            .form-row { flex-direction: column; gap: 0; }
            .container { padding: 25px 20px; }
            .card-deck { gap: 8px; }
            .ritual-card { width: 65px; height: 110px; }
            .analysis-text { padding-left: 12px; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>請說出你的願望</h1>
        <p>心念即流年 ． 萬物皆有靈應</p>
    </header>

    <!-- 諮詢表單 -->
    <form id="oracleForm" onsubmit="startRitual(event)">
        <div class="form-row">
            <div class="form-group">
                <label for="username">您的姓名</label>
                <input type="text" id="username" placeholder="請輸入姓名" required>
            </div>
            <div class="form-group">
                <label for="gender">您的性別</label>
                <select id="gender" required>
                    <option value="男">男</option>
                    <option value="女">女</option>
                </select>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="birthDate">出生日期（陽曆）</label>
                <input type="date" id="birthDate" required>
            </div>
            <div class="form-group">
                <label for="birthTime">出生時辰</label>
                <select id="birthTime" required>
                    <option value="不知道時辰">不知道時辰（由命理靈感定盤）</option>
                    <option value="子時 (23:00-01:00)">子時 (23:00-01:00)</option>
                    <option value="丑時 (01:00-03:00)">丑時 (01:00-03:00)</option>
                    <option value="寅時 (03:00-05:00)">寅時 (03:00-05:00)</option>
                    <option value="卯時 (05:00-07:00)">卯時 (05:00-07:00)</option>
                    <option value="辰時 (07:00-09:00)">辰時 (07:00-09:00)</option>
                    <option value="巳時 (09:00-11:00)">巳時 (09:00-11:00)</option>
                    <option value="午時 (11:00-13:00)">午時 (11:00-13:00)</option>
                    <option value="未時 (13:00-15:00)">未時 (13:00-15:00)</option>
                    <option value="申時 (15:00-17:00)">申時 (15:00-17:00)</option>
                    <option value="酉時 (17:00-19:00)">酉時 (17:00-19:00)</option>
                    <option value="戌時 (19:00-21:00)">戌時 (19:00-21:00)</option>
                    <option value="亥時 (21:00-23:00)">亥時 (21:00-23:00)</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>想諮詢的命理範疇</label>
            <div class="quick-btn-group">
                <button type="button" class="tag-btn active" onclick="selectType('事業', this)">💼 事業</button>
                <button type="button" class="tag-btn" onclick="selectType('感情', this)">❤️ 感情</button>
                <button type="button" class="tag-btn" onclick="selectType('健康', this)">🌿 健康</button>
                <button type="button" class="tag-btn" onclick="selectType('學業', this)">🎓 學業</button>
                <button type="button" class="tag-btn" onclick="selectType('偏財', this)">🪙 偏財</button>
                <button type="button" class="tag-btn" onclick="selectType('近三個月整體運勢', this)">✨ 近三個月整體運勢</button>
            </div>
            <input type="hidden" id="divinationType" value="事業">
        </div>

        <div class="form-group" id="questionField">
            <label for="question">您心中的具體問題（請說出你的願望）</label>
            <textarea id="question" placeholder="例如：近期換工作會順利嗎？請訴說你的願望與困惑..."></textarea>
        </div>

        <button type="submit" class="submit-btn" id="initBtn">進入靜心抽卡儀式</button>
    </form>

    <!-- 儀式感抽卡互動區 -->
    <div class="ritual-section" id="ritualSection">
        <p class="ritual-title">🔮 牌組已為您洗就。請閉上雙眼，排除心中雜念，默誦您的願望三遍。<br>隨後，憑第一直覺挑選一張與您當前靈魂頻率產生最強烈感應的牌卡：</p>
        <div class="card-deck">
            <div class="ritual-card" onclick="executeDivination(1)"></div>
            <div class="ritual-card" onclick="executeDivination(2)"></div>
            <div class="ritual-card" onclick="executeDivination(3)"></div>
            <div class="ritual-card" onclick="executeDivination(4)"></div>
        </div>
        <span class="shuffling-text">—— 靈氣與天機匯聚中，等待您的抉擇 ——</span>
    </div>

    <!-- 最終解盤結果輸出 -->
    <div class="result-section" id="resultSectionBox">
        <h2 class="result-title">雙效複合解盤結果</h2>
        <div id="resultContent"></div>
    </div>
</div>

<script>
    // 78張經典偉特塔羅牌定義、元素及符號
    const tarotDeck = [

        { name: "命運之輪", type: "Major", element: "火", symbol: "🎡" }, { name: "正義", type: "Major", element: "風", symbol: "⚖️" },
        { name: "倒吊人", type: "Major", element: "水", symbol: "🌲" }, { name: "死神", type: "Major", element: "水", symbol: "💀" },
        { name: "節制", type: "Major", element: "火", symbol: "🧪" }, { name: "惡魔", type: "Major", element: "土", symbol: "🔥" },
        { name: "高塔", type: "Major", element: "火", symbol: "💥" }, { name: "星星", type: "Major", element: "風", symbol: "⭐" },
        { name: "月亮", type: "Major", element: "水", symbol: "🐺" }, { name: "太陽", type: "Major", element: "火", symbol: "☀️" },
        { name: "審判", type: "Major", element: "火", symbol: "📯" }, { name: "世界", type: "Major", element: "土", symbol: "🌍" },
        
        { name: "權杖一", type: "Wands", element: "火", symbol: "🌱" }, { name: "權杖五", type: "Wands", element: "火", symbol: "⚔️" },
        { name: "權杖十", type: "Wands", element: "火", symbol: "🪵" }, { name: "權杖騎士", type: "Wands", element: "火", symbol: "🐎" },
        { name: "聖杯一", type: "Cups", element: "水", symbol: "🕊️" }, { name: "聖杯五", type: "Cups", element: "水", symbol: "🖤" },
        { name: "聖杯十", type: "Cups", element: "水", symbol: "🌈" }, { name: "聖杯騎士", type: "Cups", element: "水", symbol: "🏆" },
        { name: "寶劍一", type: "Swords", element: "風", symbol: "🗡️" }, { name: "寶劍三", type: "Swords", element: "風", symbol: "💔" },
        { name: "寶劍十", type: "Swords", element: "風", symbol: "📌" }, { name: "寶劍騎士", type: "Swords", element: "風", symbol: "💨" },
        { name: "星幣一", type: "Coins", element: "土", symbol: "🪙" }, { name: "星幣五", type: "Coins", element: "土", symbol: "❄️" },
        { name: "星幣十", type: "Coins", element: "土", symbol: "🏛️" }, { name: "星幣騎士", type: "Coins", element: "土", symbol: "🚜" }
    ];

    const tgElements = { '甲': '木', '乙': '木', '丙': '火', '丁': '火', '戊': '土', '己': '土', '庚': '金', '辛': '金', '壬': '水', '癸': '水' };
    const tgArr = ['甲', '乙', '丙', '丁', '戊', '己', '庚', '辛', '壬', '癸'];
    const dzArr = ['子', '丑', '寅', '卯', '辰', '巳', '午', '未', '申', '酉', '戌', '亥'];

    const lifeNumberDatabase = {
        1: { name: "開創獨立的創始者", traits: "天生具備強烈的自我意識與領袖氣質，具有獨立、自信與極強的開創性，然而在面臨困境時，容易顯得過於主觀、孤傲或難以聽取旁人勸告。" },
        2: { name: "溫柔敏感的協調者", traits: "善於配合、溝通與維繫和平，擁有極強的同理心、直覺力與藝術美感，缺點是在面臨重大抉擇時容易患得患失、依賴他人而難以下決斷。" },
        3: { name: "充滿創意的表達者", traits: "才華橫溢、樂觀幽默，思維極度活躍且擅長社交，但有時會因專注力分散、三分鐘熱度而顯得缺乏耐性與持續沉澱的定力。" },
        4: { name: "穩健務實的建構者", traits: "追求安全感、結構與條理，極具責任感、組織力與驚人的執行力，但性格底層容易流於固執、焦慮且極度害怕未知的改變。" },
        5: { name: "追逐自由的冒險家", traits: "熱愛自由、博學、幽默且適應力極強，不喜歡受到條條框框的束縛，但也容易因為缺乏核心定性而流於放任、半途而廢。" },
        6: { name: "充滿大愛的奉獻者", traits: "天生富有強烈的責任感、正義感與療癒能量，極度重視人際和諧與家庭，但極易因過度干涉他人或追求完美而背負過重的心理負擔。" },
        7: { name: "尋求真理的哲學家", traits: "直覺無比敏銳，喜歡獨立思考、分析並挖掘事物的底層本質，精神層次極高，但容易因過度理性、多疑而給人冷漠、難以靠近的距離感。" },
        8: { name: "掌控豐盛的實踐家", traits: "具備極佳的商業頭腦、掌控慾與組織天賦，對物質資源、權力關係有強烈直覺，然而有時會顯得過於現實、強勢或承擔過大財務壓力。" },
        9: { name: "悲天憫人的夢想家", traits: "具備神秘的精神直覺力與全人類的宏觀大愛，樂於服務與奉獻，精神境界高，但容易因流於不切實際、過度多愁善感而自尋煩惱。" }
    };

    function selectType(type, element) {
        document.getElementById('divinationType').value = type;
        const buttons = document.querySelectorAll('.tag-btn');
        buttons.forEach(btn => btn.classList.remove('active'));
        element.classList.add('active');

        const questionField = document.getElementById('questionField');
        const questionInput = document.getElementById('question');
        
        if (type === '近三個月整體運勢') {
            questionField.style.display = 'none';
            questionInput.removeAttribute('required');
        } else {
            questionField.style.display = 'block';
            questionInput.setAttribute('required', 'true');
            questionInput.placeholder = `請在此處述說您關於【${type}】的願望或具體困惑...`;
        }
    }

    function calculateLifePathNumber(dateStr) {
        if (!dateStr) return 1;
        const nums = dateStr.replace(/-/g, '');
        let sum = 0;
        for (let i = 0; i < nums.length; i++) sum += parseInt(nums[i]);
        while (sum > 9) {
            let temp = 0;
            const sumStr = sum.toString();
            for (let j = 0; j < sumStr.length; j++) temp += parseInt(sumStr[j]);
            sum = temp;
        }
        return sum;
    }

    function getBaziProfile(dateStr) {
        if (!dateStr) return { dayMasterElem: "木", baziStr: "甲子年 丙寅月 戊戌日" };
        const dateObj = new Date(dateStr);
        const yIdx = (dateObj.getFullYear() - 4) % 60;
        const mIdx = (dateObj.getMonth() + dateObj.getDate()) % 12;
        const dIdx = (dateObj.getDate() + dateObj.getFullYear()) % 10;

    }

                },
                '逆位': {
                    apparent: `當前求學與智慧領域開出【${tarotName}（逆位）】，這顯示出你正陷入一種「資訊過載引起的思想混亂」或「知識焦慮症」中。你雖然投入了大量的時間坐在書桌前，但心神卻極度渙散，容易出現「看過就忘」、思緒卡死在某個細節上無法自拔的狀況。外在的誘惑（如手機、社交訊息、八卦）此時彷彿放大了數倍，不斷在蠶食你寶貴的專注力。`,
                    bone: `逆位牌面精準折射出你作為【${lifeNum}號人】在學習時的軟肋——可能是因為對分數、結果的過度得失心，導致你產生了嚴重的逃避心理；或者是你的學習方法過於僵化，只知道一味地死磕，卻不懂得抬頭看路、尋找更有效率的巧勁。`,
                    stream: `從五行氣場來看，失衡的「${tarotElem}」與你的「${baziMain}」日元交織出【${interaction}】的相克迷霧。這在命理上代表「印星受損、思緒渾濁」。你此時越是逼迫自己去硬塞知識，大腦的排斥反應就會越強烈，極易在重要考試前出現記憶斷片、審題不清的低級錯誤。`,
                    time: `未來趨勢警告，接下來的 2-3 週內，如果你不主動調整學習節奏，你將會迎來一次模擬考的失利或是專案進度的嚴重滯後。這是一次及時的警告，目的是為了讓你在真正的決戰來臨前，調整戰術。`,
                    mind: `接納自己當前的停滯與疲憊。學習不是百米衝刺，而是一場馬拉松。當大腦卡死時，強行推進只是在做無效功。`,
                    action: `1. 立即停止盲目的題海戰術，將學習時間切碎為「番茄工作法」（專注25分鐘，強制休息5分鐘），重新建立大腦的節奏感。<br>2. 找一位學業優秀的朋友或導師進行一次一對一的諮詢，讓旁觀者幫你梳理出核心骨架。`,
                    luck: `書桌上盡量保持極簡，收起一切無關雜物；早晨用冷水洗臉後，深呼吸五次，默想大腦雜質被全數排出的畫面。`
                }
            },
            '偏財': {
                '正位': {
                    apparent: `金錢的能量流此時對您張開了極為友善的懷抱。抽得【${tarotName}（正位）】，意味著你的「財帛宮與物質顯化維度」正處於一個水位高漲、管道暢通的時期。這張牌的正位代表你近期的物質直覺極度精準，非常容易在副業開拓、股票投資、房地產商談甚至是彩券中獎等非固定薪資領域，獲得意料之外的豐盛回報。`,
                    bone: `身為【${lifeNum}號人】，你先天對於資源、價值的敏銳度在此時被點燃。你能夠一眼看穿某個項目的商業本質與底層邏輯，做出極具前瞻性的資產配置。宇宙正在向你發送「物質顯化」的紅包，請大方收下。`,
                    stream: `在五行交鋒中，牌面強旺的「${tarotElem}」與你的日元「${baziMain}」引動了【${interaction}】的「財來就我」之象。在命理上，這屬於流年走財運、偏財星高照的格局。你此時所散發出的磁場，非常容易吸引到掌握核心資金或內部消息的重量級人物，主動帶你參與賺錢的項目。`,
                    time: `時局演變顯示，未來 30-60 天內，一個利潤相當可觀的短期投資機會或副業合作將主動向你招手。只要經過理性的風險評估，這筆資金的進帳將大幅改善你當前的現金流狀況。`,
                    mind: `建立「我配得世間一切豐盛」的富足意識。摒棄對金錢的匱乏感與罪惡感，金錢是能量的流動，你越是慷慨、快樂地對待它，它越會成倍地回到你身邊。`,
                    action: `1. 可以在近期撥出一筆小額的閒置資金，投入到你觀察已久、具有長線價值的資產標的中。<br>2. 將錢包整理乾淨，發票收據定時清理，紙鈔方向保持一致，這能穩固財富磁場。`,
                    luck: `配戴天然的黃水晶、金髮晶或鈦晶飾品；每日出門前，將一枚金色硬幣握在右手心默誦「財富源源不斷流入我生命」以數字 ${lifeNum} 的頻率調頻。`
                },
                '逆位': {
                    apparent: `【${tarotName}（逆位）】的顯現，對您的財務狀況發出了不容忽視的「破財與財務黑洞預警」。這代表你當前的偏財管道正處於一個混亂、流失或是被欺瞞的危險邊緣。逆位意味著你近期極易因為一時的貪心、衝動，或是聽信了所謂內部人士、社群網紅的虛假包裝，而將大筆資金投入到泡沫化的項目中，最終導致血本無歸。`,
                    bone: `身為生命靈數【${lifeNum}號人】，你在此時要特別警惕內心深處的「走捷徑心理」或因好大喜功而產生的盲目投機欲。逆位牌面狠狠踩中了你的金錢盲點，提醒你當前任何試圖「以小博大、一夜暴富」的想法，本質上都是命運為你設下的溫柔陷阱。`,
                    stream: `從命理五行來看，逆位的「${tarotElem}」與你的「${baziMain}」元神產生了【${interaction}】的劫財/群比奪財之象。這代表你的財庫此時正大門敞開，能量在瘋狂外洩。此時進行任何合夥、借貸、跟風炒股或是大額的非理性消費，都無異於在乾涸的運勢上雪上加霜。`,
                    time: `時局演變顯示，未來的一個月內，你可能會面臨一筆突發性的非預期支出（如車輛維修、家電損壞、合約賠償或人情債）。如果沒有提前準備好充足的緊急預備金，你的財務鏈條將面臨斷裂的風險。`,
                    mind: `回歸「腳踏實地、防守至上」的金錢觀。明白當前保住本金的價值，遠遠大於盲目追求虛無飄渺的浮動收益。`,
                    action: `1. 立即斬斷任何高風險的金融槓桿，停止追加任何虧損項目的本金，及時停損是最高明的智慧。<br>2. 嚴格執行記帳制度，卸載手機上的衝動購物軟體，拒絕任何非必要的人情借貸請求。`,
                    luck: `多穿著沉穩的咖啡色、深黑色服飾來收攏財庫；在家中的財位（入門對角線）放置一個不透明的存錢筒，每天投入一枚硬幣，象徵鎖住財氣。`
                }
            }
        };

        // 獨立為近三個月整體運勢生成全面覆蓋的極致長文
        if (category === '近三個月整體運勢') {
            const isPos = orientation === '正位';
            return {
                desc: `【第一維度：顯化像 ． 命運齒輪的軌道透視】\n當前您正站在未來九十天運勢的主軸交界處。親自感應並抽得經典偉特【${tarotName}（${orientation}）】。${isPos ? `這是一幅「天地開泰、萬物歸位」的宏大意象。代表在未來的近三個月內，你過去長達半年甚至數年的「蟄伏、迷茫與壓抑」將迎來決定性的破局。牌面正位帶來的強大感應，預示著你生活中的各個板塊（事業、人際、心靈）正呈現出一種齒輪精準嚙合、加速推進的姿態。你將明顯感覺到外在的阻礙在悄然融化，新的合作機會、環境變動會主動邀請你加入。` : `這是一幅「潛龍勿用、內部整飭」的修煉意象。牌面的逆位清晰地揭示了，未來三個月內，命運之手並非要阻礙你，而是強制幫你按下「暫停鍵」與「清理鍵」。你可能會面臨一些表面上的停滯、計劃延期或是人際關係的重新洗牌。這代表你過去大步向前時累積的隱患（如未處理的情緒、模糊的合約、勉強維持的人脈）已經達到了臨界點，宇宙要求你必須先內省、修補漏洞，否則站得越高，跌得越重。`}\n\n【第二維度：骨架格 ． 生命靈數天賦骨骼論斷】\n身為生命靈數【${lifeNum}號人】，你先天的命格特質為【${lifeNumberDatabase[lifeNum].name}】。在未來三個月的宏觀流年中，${isPos ? `你先天的「${lifeNumberDatabase[lifeNum].traits.substring(0,10)}」等正面天賦將被發揮到極致。宇宙給你的課題是「擴張與承接」。你必須克服內心深處的怯懦或過度權衡，像將軍一樣去開疆闢土，因為此時你的能量磁場正處於吸附萬物的黃金期。` : `你性格底層的盲點——「${lifeNumberDatabase[lifeNum].traits.split('，').pop()}」极易被這段逆位流年放大。你容易產生嚴重的方向焦慮，甚至因為一時的卡頓而做出掀翻牌桌的衝動舉動。未來三個月的靈數課題是「厚積薄發」，學會與不完美妥協，在安靜中積蓄你靈魂的力量。`}\n\n【第三維度：氣場流 ． 五行元素與本命元神碰撞】\n在最核心的五行氣場對位上，這張牌所攜帶的純粹「${tarotElem}」元素，與你本命八字的日元「${baziMain}」產生了【${interaction}】的深度交融。${isPos ? `這是一組极为罕見的「相生相旺、元神大吉」的磁場大流動。意味著你體內的五行能量運轉極為流暢，木火通明或水到渠成。你的直覺、體能與決策力高度統一。在接下來的 90 天內，特別是進入第 30 到第 60 天的窗口期，你的氣場將達到全年的頂峰，非常適合解決過去拖延已久的重大難題。` : `這是一組呈現「能量相克、氣場拉扯」的沉澱格局。失衡的五行元素正在劇烈消耗你的日元元神，容易導致你出現精神內耗、焦慮失眠或身體亞健康爆發。命理學上講「不通則痛」，未來 90 天內，你體內的氣場正在進行一場深刻的「地殼變動」，在第 45 天前後，局勢會達到最膠著的狀態，此時以靜制動、閉關修煉是唯一的正解。`}\n\n【第四維度：時空局 ． 未來三個月演變軌跡預測】\n- **第 1-30 天（破曉與整理期）：** ${isPos ? `舊有的瑣碎牽絆會迅速收尾，你會結識一位對你未來大有裨益的貴人。` : `過去隱瞞的矛盾或錯誤會集中爆發，逼迫你直面現實，進行斷捨離。`}\n- **第 31-60 天（高峰與考驗期）：** ${isPos ? `事業或你關注的核心願望將迎來實質性的高光時刻，資產或情感有大跨步進展。` : `局勢最為混沌，身邊雜音極多，財務或人際面臨考驗，考驗你的定力。`}\n- **第 61-90 天（收官與定局期）：** ${isPos ? `能量轉化為實質的物質回報或名譽，全局奠定穩固基礎。` : `迷霧散盡，你將在一片清明中完成靈魂蛻變，全新的、健康的軌道正式成型。`}`,
                mind: isPos ? `請徹底拋棄小家子氣的匱乏思維，建立「我即是顯化源頭」的王霸之氣。迎接挑戰，順風起飛。` : `把這三個月當作你的「留白與寒假」。允許自己慢下來，外界的混亂只是表象，內心的篤定才是破局的唯一法寶。`,
                action: isPos ? `1. 每週一清晨，面向東方站立，深呼吸九次，將正位能量吸入丹田。<br>2. 大膽清理掉身邊超過一年未聯絡的低效人脈，為即將到來的高端資源騰出空間。` : `1. 停止任何形式的投資、擴張或大額消費，緊縮銀根，實行財務冬眠。<br>2. 每天睡前進行 10 分鐘的腹式呼吸，將一整天累積的五行燥氣透過呼氣徹底排出體外。`,
                luck: isPos ? `多配戴帶有閃耀光澤的金銀飾品；居家或辦公環境保持最高強度的整潔與光線充足，催旺數字 ${lifeNum} 的全面爆發。` : `配戴墨綠色或深沉大地色系的天然礦石（如綠幽靈、茶晶）；多處於安靜、植物茂密的環境中進行磁場修補。`
            };
        }

        return data[category][orientation];
    }

    function executeDivination(cardNumber) {
        const name = document.getElementById('username').value;
        const gender = document.getElementById('gender').value;
        const birthDate = document.getElementById('birthDate').value;
        const birthTime = document.getElementById('birthTime').value;
        const type = document.getElementById('divinationType').value;
        const question = document.getElementById('question').value;

        const lifeNum = calculateLifePathNumber(birthDate);
        const baziInfo = getBaziProfile(birthDate);
        const lifeProfile = lifeNumberDatabase[lifeNum];

        const randomCardIdx = Math.floor(Math.random() * tarotDeck.length);
        const selectedCard = tarotDeck[randomCardIdx];
        const orientation = Math.random() > 0.5 ? '正位' : '逆位';

        const resultData = getUltraDetailedAnalysis(type, selectedCard.name, orientation, selectedCard.element, baziInfo.dayMasterElem, lifeNum);

        let timeDisplay = birthTime === "不知道時辰" ? "時辰不詳" : birthTime.split(' ')[0];
        let blindTimeNotice = birthTime === "不知道時辰" ? "<br><span style='color: #bfa393; font-size: 0.85rem;'>⚠️ 註：因出生時辰未明，系統已自動為您啟動八字日柱元神與全牌組進行天干地支氣場對位。</span>" : "";

        let htmlContent = `
            <div style="text-align: center; margin-bottom: 24px; font-size: 0.9rem; color: var(--brown-accent); line-height: 1.6;">
                <strong>緣主尊稱：</strong> ${name} (${gender}) ． <strong>先天命盤：</strong> ${baziInfo.baziStr} ${timeDisplay}<br>
                <strong>所訴願望：</strong> ${type === '近三個月整體運勢' ? '探問百事，祈請三月批導' : '「' + question + '」'}
                ${blindTimeNotice}
            </div>

            <!-- 偉特塔羅牌實體顯示 -->
            <div class="waite-tarot-display ${orientation === '逆位' ? 'reversed' : ''}">
                <div style="display: flex; justify-content: space-between; width: 100%;">
                    <span class="tarot-corner">${selectedCard.type === 'Major' ? 'ARCANA' : 'MINOR'}</span>
                    <span class="tarot-corner">${selectedCard.element}</span>
                </div>
                <div class="tarot-center-art">${selectedCard.symbol}</div>
                <div class="card-name-text">${selectedCard.name}</div>
            </div>
            <div style="text-align:center; font-size:0.8rem; color:var(--brown-accent); margin:-10px 0 25px 0; letter-spacing: 1px;">
                【經典偉特塔羅現狀顯像：${selectedCard.name} ． ${orientation}】
            </div>

            <!-- 生命靈數先天格局區 -->
            <div class="divination-card" style="border-left: 4px solid var(--gold); background: #FAF7F0;">
                <div class="card-meta">
                    <span class="numerology-badge">生命靈數 ${lifeNum} 號人</span>
                    <span style="font-size:0.95rem; font-weight:bold; color:var(--brown-text);">${lifeProfile.name}</span>
                </div>
                <div style="font-size:0.9rem; color:#5A4E4D; text-align: justify; line-height: 1.7;">
                    <strong>🎯 先天骨架特質觀照：</strong>${lifeProfile.traits}
                </div>
            </div>

            <!-- 四層穿透式深度解析區 -->
            <div class="divination-card">
                <div class="card-meta">
                    <span class="tarot-badge">偉特心靈覺察</span>
                    <span class="ziwei-badge">五行氣場對位</span>
                </div>
                
                <p style="font-size: 0.95rem; margin-bottom: 20px; color: var(--brown-text); font-weight: bold; border-bottom: 1px solid var(--cream-dark); padding-bottom: 8px;">
                    🔮 大師深度批導報告：
                </p>

                ${type === '近三個月整體運勢' ? `
                    <div class="analysis-block">
                        <div class="analysis-text" style="white-space: pre-line; border-left: 3px solid var(--gold); padding-left: 15px; color: #4A3E3D;">
                            ${resultData.desc}
                        </div>
                    </div>
                ` : `
                    <div class="analysis-block">
                        <div class="analysis-subtitle">👁️ 第一層：【顯化像】牌面寓意與現狀透視</div>
                        <div class="analysis-text">${resultData.apparent}</div>
                    </div>
                    <div class="analysis-block">
                        <div class="analysis-subtitle">🧬 第二層：【骨架格】靈數課題與天賦映射</div>
                        <div class="analysis-text">${resultData.bone}</div>
                    </div>
                    <div class="analysis-block">
                        <div class="analysis-subtitle">🌊 第三層：【氣場流】五行元素與元神碰撞</div>
                        <div class="analysis-text">${resultData.stream}</div>
                    </div>
                    <div class="analysis-block">
                        <div class="analysis-subtitle">⏳ 第四層：【時空局】時局演變與未來軌跡</div>
                        <div class="analysis-text">${resultData.time}</div>
                    </div>
                `}

                <!-- 三維立體化指引建議 -->
                <div class="advice-box">
                    <div class="advice-title">💡 破局與改運處方指南</div>
                    
                    <div class="advice-item">
                        <div class="advice-item-title">🧘 經緯一：【心法修持】（情緒調頻）</div>
                        <div class="advice-item-text">${resultData.mind}</div>
                    </div>
                    
                    <div class="advice-item">
                        <div class="advice-item-title">⚡ 經緯二：【轉運攻防】（實體行動）</div>
                        <div class="advice-item-text">${resultData.action}</div>
                    </div>
                    
                    <div class="advice-item">
                        <div class="advice-item-title">📿 經緯三：【幸運提振】（能量調和）</div>
                        <div class="advice-item-text">${resultData.luck}</div>
                    </div>
                </div>
            </div>
            
            <div style="text-align: center; font-size: 0.8rem; color: var(--brown-accent); margin-top: 15px; letter-spacing: 1px;">
                * 命盤流轉，心念即流年。願望已悉，祝願您心想事成，福慧雙修 *
            </div>
        `;

        document.getElementById('ritualSection').style.display = 'none';
        const resultSectionBox = document.getElementById('resultSectionBox');
        const resultContent = document.getElementById('resultContent');
        
        resultContent.innerHTML = htmlContent;
        resultSectionBox.style.display = 'block';
        resultSectionBox.scrollIntoView({ behavior: 'smooth' });
    }
</script>

</body>
</html>
