<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多維複合命盤 ． 3+1張時空塔羅牌陣版</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght=400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #FDFBF7;
            --cream-light: #F7F3EB;
            --cream-dark: #EADBC8;
            --brown-text: #4A3E3D;
            --brown-accent: #8C786E;
            --white: #FFFFFF;
            --gold: #C5A880;
            --sage: #A39389;
            --red-alert: #C86B5D;
            --pink-bg: #FAF2F2;
            --pink-border: #E8C5C5;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Noto Serif TC', serif, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--brown-text);
            line-height: 1.8;
            padding: 20px 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--white);
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 10px 30px rgba(140, 120, 110, 0.08);
            border: 1px solid var(--cream-light);
        }

        header {
            text-align: center;
            margin-bottom: 35px;
        }

        header h1 {
            font-size: 1.8rem;
            color: var(--brown-text);
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        header p {
            font-size: 0.9rem;
            color: var(--brown-accent);
        }

        .form-section-title {
            font-size: 0.95rem;
            font-weight: bold;
            color: var(--brown-text);
            margin: 15px 0 10px 0;
            padding-bottom: 5px;
            border-bottom: 1px solid var(--cream-dark);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-row {
            display: flex;
            gap: 15px;
        }

        .form-row .form-group {
            flex: 1;
        }

        label {
            display: block;
            font-size: 0.85rem;
            margin-bottom: 8px;
            font-weight: bold;
            color: var(--brown-accent);
        }

        input[type="text"], input[type="date"], select, textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--cream-dark);
            border-radius: 12px;
            background-color: var(--bg-color);
            color: var(--brown-text);
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--brown-accent);
            box-shadow: 0 0 0 3px rgba(140, 120, 110, 0.15);
        }

        textarea {
            resize: none;
            height: 90px;
        }

        .sub-type-container {
            display: none;
            background: var(--bg-color);
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid var(--cream-dark);
            margin-top: 10px;
        }

        .radio-group {
            display: flex;
            gap: 20px;
        }

        .radio-label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
            cursor: pointer;
            color: var(--brown-text);
            margin-bottom: 0;
        }

        .radio-label input[type="radio"] {
            accent-color: var(--red-alert);
        }

        .partner-info-card {
            display: none;
            background-color: var(--pink-bg);
            border: 1px solid var(--pink-border);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 20px;
        }

        .quick-btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 8px;
        }

        .tag-btn {
            background-color: var(--cream-light);
            border: 1px solid transparent;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            color: var(--brown-text);
            transition: all 0.2s;
        }

        .tag-btn.active, .tag-btn:hover {
            background-color: var(--brown-accent);
            color: var(--white);
        }

        .submit-btn {
            width: 100%;
            background-color: var(--brown-accent);
            color: var(--white);
            border: none;
            padding: 16px;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 2px;
            margin-top: 15px;
        }

        /* 🔮 弧形抽卡互動區架構 */
        .ritual-section {
            display: none;
            text-align: center;
            margin-top: 30px;
            padding: 40px 10px;
            background: var(--cream-light);
            border-radius: 20px;
            border: 1px dashed var(--brown-accent);
            overflow: hidden;
        }

        .ritual-title {
            font-size: 1.05rem;
            color: var(--brown-text);
            margin-bottom: 5px;
            font-weight: bold;
        }

        .ritual-steps-hint {
            font-size: 1.2rem;
            color: var(--red-alert);
            margin-bottom: 25px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* ✨ 核心：卡牌經典 3D 弧形扇面佈局 */
        .arc-deck-wrapper {
            position: relative;
            height: 340px;
            margin: 40px auto 20px auto;
            max-width: 650px;
        }

        .arc-deck-center {
            position: absolute;
            bottom: -260px; /* 扇形旋轉中心點 */
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            height: 100%;
        }

        .ritual-card {
            position: absolute;
            bottom: 0;
            left: calc(50% - 45px); /* 置中對齊 */
            width: 90px;
            height: 155px;
            background: linear-gradient(135deg, #3A2F2E 0%, #1A1211 100%);
            border: 2px solid var(--gold);
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transform-origin: center -260px; /* 以中軸下方為圓心旋轉 */
            transition: transform 0.3s ease, bottom 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ritual-card::before {
            content: "🔱";
            color: var(--gold);
            font-size: 1.3rem;
            opacity: 0.7;
        }

        /* 懸停往上抽起並綻放光芒 */
        .ritual-card:hover {
            bottom: 20px; 
            box-shadow: 0 15px 30px rgba(197, 168, 128, 0.6);
            border-color: var(--white);
            z-index: 999 !important;
        }

        /* 已被選中抽起的卡片樣式 */
        .ritual-card.selected-drawn {
            visibility: hidden;
            pointer-events: none;
        }

        .shuffling-text {
            font-size: 0.85rem;
            color: var(--brown-accent);
            font-style: italic;
        }

        /* 最終解盤牌陣展現區 */
        .result-section {
            display: none;
            margin-top: 40px;
            padding-top: 30px;
            border-top: 2px dashed var(--cream-dark);
        }

        .result-title {
            text-align: center;
            font-size: 1.35rem;
            margin-bottom: 25px;
            color: var(--brown-text);
            letter-spacing: 2px;
        }

        /* 3+1 四張牌排版 */
        .array-display-container {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 30px;
        }

        .array-card-item {
            flex: 1;
            text-align: center;
        }

        .array-card-tag {
            font-size: 0.85rem;
            font-weight: bold;
            color: var(--white);
            background: var(--brown-accent);
            padding: 3px 8px;
            border-radius: 4px;
            display: inline-block;
            margin-bottom: 8px;
        }
        .array-card-tag.conclusion-tag {
            background: var(--red-alert);
        }

        .waite-tarot-card-body {
            width: 100%;
            height: 200px;
            background: #1A1211;
            border: 3px solid var(--gold);
            border-radius: 10px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.15);
            overflow: hidden;
            transition: transform 0.5s ease;
        }

        .waite-tarot-card-body img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .waite-tarot-card-body.reversed-visual {
            transform: rotate(180deg);
        }

        .array-card-name {
            font-size: 0.8rem;
            font-weight: bold;
            margin-top: 6px;
            color: var(--brown-text);
        }

        .divination-card {
            background: var(--cream-light);
            border-radius: 18px;
            padding: 26px;
            margin-bottom: 22px;
        }

        .card-meta {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 18px;
        }

        .tarot-badge { background: var(--brown-accent); color: var(--white); padding: 4px 12px; border-radius: 6px; font-size: 0.75rem; font-weight: bold;}
        .ziwei-badge { background: var(--sage); color: var(--white); padding: 4px 12px; border-radius: 6px; font-size: 0.75rem; font-weight: bold;}
        .numerology-badge { background: var(--gold); color: var(--brown-text); padding: 4px 12px; border-radius: 6px; font-size: 0.75rem; font-weight: bold;}
        .bazi-element-badge { background: #4A3E3D; color: #FFF; padding: 4px 12px; border-radius: 6px; font-size: 0.75rem; font-weight: bold;}
        .bazi-missing-badge { background: var(--red-alert); color: #FFF; padding: 4px 12px; border-radius: 6px; font-size: 0.75rem; font-weight: bold;}
        .match-badge { background: #C86B5D; color: #FFF; padding: 4px 12px; border-radius: 6px; font-size: 0.75rem; font-weight: bold;}

        .wuxing-chart {
            margin: 15px 0;
            background: #FFF;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--cream-dark);
        }
        .wuxing-row {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }
        .wuxing-name { width: 50px; font-size: 0.85rem; font-weight: bold; }
        .wuxing-bar-bg { flex: 1; background: #EEE; height: 12px; border-radius: 6px; overflow: hidden; margin: 0 10px; }
        .wuxing-bar-fill { height: 100%; border-radius: 6px; width: 0%; transition: width 1s ease; }

        .match-score-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            margin: 15px 0;
            background: #FFF;
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--pink-border);
        }
        .match-circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: radial-gradient(#FFF 60%, transparent 61%), conic-gradient(var(--red-alert) var(--score-p, 0%), #EEE 0%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            font-weight: bold;
            color: var(--red-alert);
        }
        .match-verdict { flex: 1; font-size: 0.9rem; color: var(--brown-text); }

        .analysis-block { margin-bottom: 25px; text-align: justify; }
        .analysis-subtitle { font-weight: bold; color: var(--brown-text); margin-bottom: 8px; font-size: 0.98rem; display: flex; align-items: center; gap: 6px; }
        .analysis-text { font-size: 0.95rem; color: #5A4E4D; padding-left: 20px; border-left: 2px solid var(--cream-dark); }

        .advice-box { background: #F4EFE6; border-radius: 14px; padding: 22px; margin-top: 25px; }
        .advice-title { font-size: 1rem; font-weight: bold; color: var(--brown-text); margin-bottom: 15px; border-bottom: 1px dashed var(--brown-accent); padding-bottom: 6px; }
        .advice-item { margin-bottom: 18px; }
        .advice-item-title { font-weight: bold; font-size: 0.9rem; color: var(--brown-accent); margin-bottom: 4px; }
        .advice-item-text { font-size: 0.9rem; color: var(--brown-text); text-align: justify; }

        @media (max-width: 600px) {
            .form-row { flex-direction: column; gap: 0; }
            .container { padding: 25px 20px; }
            .array-display-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
            .waite-tarot-card-body { height: 160px; }
            .arc-deck-wrapper { height: 290px; }
            .ritual-card { width: 75px; height: 130px; transform-origin: center -200px; }
            .arc-deck-center { bottom: -200px; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>請說出你的願望</h1>
        <p>八字五行 ． 紫微靈數 ． 3+1時空流轉聖三角牌陣</p>
    </header>

    <form id="oracleForm" onsubmit="startRitual(event)">
        <div class="form-section-title">👤 您的個人資料（本命盤根基）</div>
        <div class="form-row">
            <div class="form-group">
                <label for="username">您的姓名</label>
                <input type="text" id="username" placeholder="請輸入姓名" required>
            </div>
            <div class="form-group">
                <label for="gender">您的性別</label>
                <select id="gender" required>
                    <option value="男">男</option>
                    <option value="女">女</option>
                </select>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="birthDate">出生日期（陽曆）</label>
                <input type="date" id="birthDate" required>
            </div>
            <div class="form-group">
                <label for="birthTime">出生時辰</label>
                <select id="birthTime" required>
                    <option value="不知道時辰">不知道時辰（由命理靈感定盤）</option>
                    <option value="子時 (23:00-01:00)">子時 (23:00-01:00)</option>
                    <option value="丑時 (01:00-03:00)">丑時 (01:00-03:00)</option>
                    <option value="寅時 (03:00-05:00)">寅時 (03:00-05:00)</option>
                    <option value="卯時 (05:00-07:00)">卯時 (05:00-07:00)</option>
                    <option value="辰時 (07:00-09:00)">辰時 (07:00-09:00)</option>
                    <option value="巳時 (09:00-11:00)">巳時 (09:00-11:00)</option>
                    <option value="午時 (11:00-13:00)">午時 (11:00-13:00)</option>
                    <option value="未時 (13:00-15:00)">未時 (13:00-15:00)</option>
                    <option value="申時 (15:00-17:00)">申時 (15:00-17:00)</option>
                    <option value="酉時 (17:00-19:00)">酉時 (17:00-19:00)</option>
                    <option value="戌時 (19:00-21:00)">戌時 (19:00-21:00)</option>
                    <option value="亥時 (21:00-23:00)">亥時 (21:00-23:00)</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>想諮詢的命理範疇</label>
            <div class="quick-btn-group">
                <button type="button" class="tag-btn active" onclick="selectType('事業', this)">💼 事業</button>
                <button type="button" class="tag-btn" onclick="selectType('感情', this)">❤️ 感情</button>
                <button type="button" class="tag-btn" onclick="selectType('健康', this)">🌿 健康</button>
                <button type="button" class="tag-btn" onclick="selectType('學業', this)">🎓 學業</button>
                <button type="button" class="tag-btn" onclick="selectType('偏財', this)">🪙 偏財</button>
                <button type="button" class="tag-btn" onclick="selectType('近三個月整體運勢', this)">✨ 近三個月整體運勢</button>
            </div>
            <input type="hidden" id="divinationType" value="事業">

            <div class="sub-type-container" id="loveSubContainer">
                <label style="color: var(--red-alert); font-size: 0.8rem;">請選擇感情諮詢模式：</label>
                <div class="radio-group">
                    <label class="radio-label"><input type="radio" name="loveSubType" value="雙人合盤" checked onclick="togglePartnerCard(true)"> 💞 雙人合盤</label>
                    <label class="radio-label"><input type="radio" name="loveSubType" value="單純算感情運勢" onclick="togglePartnerCard(false)"> 🌹 單純算感情運勢</label>
                </div>
            </div>
        </div>

        <div class="partner-info-card" id="partnerCard">
            <div class="form-section-title" style="color: var(--red-alert); border-bottom-color: var(--pink-border); margin-top:0;">💞 他/她的個人資料</div>
            <div class="form-row">
                <div class="form-group">
                    <label for="partnerName" style="color: var(--red-alert);">對方姓名</label>
                    <input type="text" id="partnerName" placeholder="請輸入對方姓名">
                </div>
                <div class="form-group">
                    <label for="partnerGender" style="color: var(--red-alert);">對方性別</label>
                    <select id="partnerGender">
                        <option value="女">女</option>
                        <option value="男">男</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="partnerBirthDate" style="color: var(--red-alert);">對方生日（陽曆）</label>
                    <input type="date" id="partnerBirthDate">
                </div>
                <div class="form-group">
                    <label for="partnerBirthTime" style="color: var(--red-alert);">對方時辰</label>
                    <select id="partnerBirthTime">
                        <option value="不知道時辰">不知道時辰</option>
                        <option value="子時 (23:00-01:00)">子時</option>
                        <!-- 節省篇幅，保留精簡 -->
                    </select>
                </div>
            </div>
        </div>

        <div class="form-group" id="questionField">
            <label for="question">您心中的具體問題</label>
            <textarea id="question" placeholder="請訴說你的願望與困惑..."></textarea>
        </div>

        <button type="submit" class="submit-btn" id="initBtn">進入靜心弧形抽卡儀式</button>
    </form>

    <!-- 🔮 弧形洗牌與抽卡區 -->
    <div class="ritual-section" id="ritualSection">
        <p class="ritual-title">🔮 命運牌組已依據您的磁場呈弧形鋪開</p>
        <div class="ritual-steps-hint" id="stepHint">請憑直覺抽取第 1 張牌：【代表過去】</div>
        
        <div class="arc-deck-wrapper">
            <div class="arc-deck-center" id="cardContainer">
                <!-- 由 JavaScript 動態生成扇形牌組 -->
            </div>
        </div>
        <span class="shuffling-text">—— 靜心專注，當前已抽取 <span id="drawCount">0</span> / 4 張卡牌 ——</span>
    </div>

    <!-- 最終解盤結果 -->
    <div class="result-section" id="resultSectionBox">
        <h2 class="result-title">時空宿命複合解盤報告</h2>
        <div id="resultContent"></div>
    </div>
</div>

<script>
    const tarotDeck = [
        { name: "愚者", element: "風", img: "https://upload.wikimedia.org/wikipedia/commons/0/0b/RWS_Tarot_00_Fool.jpg" },
        { name: "魔術師", element: "風", img: "https://upload.wikimedia.org/wikipedia/commons/d/de/RWS_Tarot_01_Magician.jpg" },
        { name: "女祭司", element: "水", img: "https://upload.wikimedia.org/wikipedia/commons/8/88/RWS_Tarot_02_High_Priestess.jpg" },
        { name: "女皇", element: "土", img: "https://upload.wikimedia.org/wikipedia/commons/d/d2/RWS_Tarot_03_Empress.jpg" },
        { name: "皇帝", element: "火", img: "https://upload.wikimedia.org/wikipedia/commons/c/c3/RWS_Tarot_04_Emperor.jpg" },
        { name: "教皇", element: "土", img: "https://upload.wikimedia.org/wikipedia/commons/8/8d/RWS_Tarot_05_Hierophant.jpg" },
        { name: "戀人", element: "風", img: "https://upload.wikimedia.org/wikipedia/commons/3/3a/RWS_Tarot_06_Lovers.jpg" },
        { name: "戰車", element: "水", img: "https://upload.wikimedia.org/wikipedia/commons/9/9b/RWS_Tarot_07_Chariot.jpg" },
        { name: "力量", element: "火", img: "https://upload.wikimedia.org/wikipedia/commons/f/f5/RWS_Tarot_08_Strength.jpg" },
        { name: "隱者", element: "土", img: "https://upload.wikimedia.org/wikipedia/commons/4/4d/RWS_Tarot_09_Hermit.jpg" },
        { name: "命運之輪", element: "火", img: "https://upload.wikimedia.org/wikipedia/commons/3/3c/RWS_Tarot_10_Wheel_of_Fortune.jpg" },
        { name: "正義", element: "風", img: "https://upload.wikimedia.org/wikipedia/commons/e/e0/RWS_Tarot_11_Justice.jpg" },
        { name: "倒吊人", element: "水", img: "https://upload.wikimedia.org/wikipedia/commons/2/2b/RWS_Tarot_12_Hanged_Man.jpg" },
        { name: "死神", element: "水", img: "https://upload.wikimedia.org/wikipedia/commons/d/d7/RWS_Tarot_13_Death.jpg" },
        { name: "節制", element: "火", img: "https://upload.wikimedia.org/wikipedia/commons/f/f8/RWS_Tarot_14_Temperance.jpg" },
        { name: "惡魔", element: "土", img: "https://upload.wikimedia.org/wikipedia/commons/5/55/RWS_Tarot_15_Devil.jpg" },
        { name: "高塔", element: "火", img: "https://upload.wikimedia.org/wikipedia/commons/5/53/RWS_Tarot_16_Tower.jpg" },
        { name: "星星", element: "風", img: "https://upload.wikimedia.org/wikipedia/commons/d/db/RWS_Tarot_17_Star.jpg" },
        { name: "月亮", element: "水", img: "https://upload.wikimedia.org/wikipedia/commons/7/7f/RWS_Tarot_18_Moon.jpg" },
        { name: "太陽", element: "火", img: "https://upload.wikimedia.org/wikipedia/commons/1/17/RWS_Tarot_19_Sun.jpg" },
        { name: "審判", element: "火", img: "https://upload.wikimedia.org/wikipedia/commons/d/dd/RWS_Tarot_20_Judgement.jpg" },
        { name: "世界", element: "土", img: "https://upload.wikimedia.org/wikipedia/commons/f/ff/RWS_Tarot_21_World.jpg" }
    ];

    const tgElements = { '甲': '木', '乙': '木', '丙': '火', '丁': '火', '戊': '土', '己': '土', '庚': '金', '辛': '金', '壬': '水', '癸': '水' };
    const dzElements = { '子': '水', '丑': '土', '寅': '木', '卯': '木', '辰': '土', '巳': '火', '午': '火', '未': '土', '申': '金', '酉': '金', '戌': '土', '亥': '水' };
    const tgArr = ['甲', '乙', '丙', '丁', '戊', '己', '庚', '辛', '壬', '癸'];
    const dzArr = ['子', '丑', '寅', '卯', '辰', '巳', '午', '未', '申', '酉', '戌', '亥'];

    const lifeNumberDatabase = {
        1: { name: "開創獨立的創始者", traits: "天生具備領袖氣質，自信開創，但面臨困境時易流於孤傲主觀。" },
        2: { name: "溫柔敏感的協調者", traits: "善於溝通配合，同理心極強，缺點是面臨決策時患得患失。" },
        3: { name: "充滿創意的表達者", traits: "才華橫溢、樂觀幽默，但有時會因專注力分散而顯得缺乏耐性。" },
        4: { name: "穩健務實的建構者", traits: "追求安全感與條理，極具責任感，但性格底層害怕未知改變。" },
        5: { name: "追逐自由的冒險家", traits: "熱愛自由、適應力極強，不喜歡受束縛，但容易缺乏定性。" },
        6: { name: "充滿大愛的奉獻者", traits: "富有強烈責任感與療癒能量，重感情，易過度追求完美而背負重擔。" },
        7: { name: "尋求真理的哲學家", traits: "直覺敏銳，喜歡獨立思考，但容易因過度理性給人冷漠距離感。" },
        8: { name: "掌控豐盛的實踐家", traits: "具備優秀商業頭腦，對物質資源敏感，有時掌控慾過強。" },
        9: { name: "悲天憫人的夢想家", traits: "具備神秘精神直覺與大愛，樂於服務，但容易不切實際。" }
    };

    let userDrawnCards = [];
    const stepHints = [
        "請憑直覺抽取第 1 張牌：【代表過去】",
        "請憑直覺抽取第 2 張牌：【代表現在】",
        "請憑直覺抽取第 3 張牌：【代表未來】",
        "最後，請抽取第 4 張牌：【核心結局牌】"
    ];

    function selectType(type, element) {
        document.getElementById('divinationType').value = type;
        document.querySelectorAll('.tag-btn').forEach(btn => btn.classList.remove('active'));
        element.classList.add('active');

        const loveSubContainer = document.getElementById('loveSubContainer');
        const questionInput = document.getElementById('question');
        const questionField = document.getElementById('questionField');

        questionField.style.display = 'block';
        questionInput.setAttribute('required', 'true');

        if (type === '感情') {
            loveSubContainer.style.display = 'block';
            togglePartnerCard(document.querySelector('input[name="loveSubType"]:checked').value === '雙人合盤');
        } else {
            loveSubContainer.style.display = 'none';
            togglePartnerCard(false);
            if (type === '近三個月整體運勢') {
                questionField.style.display = 'none';
                questionInput.removeAttribute('required');
            }
        }
    }

    function togglePartnerCard(show) {
        const card = document.getElementById('partnerCard');
        if (show) {
            card.style.display = 'block';
            document.getElementById('partnerName').setAttribute('required', 'true');
            document.getElementById('partnerBirthDate').setAttribute('required', 'true');
        } else {
            card.style.display = 'none';
            document.getElementById('partnerName').removeAttribute('required');
            document.getElementById('partnerBirthDate').removeAttribute('required');
        }
    }

    // 啟動儀式：動態生成弧形牌組
    function startRitual(event) {
        event.preventDefault();
        userDrawnCards = [];
        document.getElementById('drawCount').innerText = "0";
        document.getElementById('stepHint').innerText = stepHints[0];
        
        const container = document.getElementById('cardContainer');
        container.innerHTML = '';

        // 生成 15 張牌，呈現完美對稱的弧形扇面
        const totalCards = 15;
        const startAngle = -35; // 起始旋轉角度
        const endAngle = 35;   // 結束旋轉角度
        const angleStep = (endAngle - startAngle) / (totalCards - 1);

        for (let i = 0; i < totalCards; i++) {
            const cardOpt = document.createElement('div');
            cardOpt.className = 'ritual-card';
            const currentAngle = startAngle + (i * angleStep);
            
            // 運用 3D transform 讓卡牌圍繞底端軸心旋轉排開
            cardOpt.style.transform = `rotate(${currentAngle}deg)`;
            cardOpt.style.zIndex = i;
            cardOpt.setAttribute('onclick', `pickCard(this, ${i})`);
            container.appendChild(cardOpt);
        }

        document.getElementById('ritualSection').style.display = 'block';
        document.getElementById('resultSectionBox').style.display = 'none';
        document.getElementById('ritualSection').scrollIntoView({ behavior: 'smooth' });
    }

    // 處理抽卡點擊
    function pickCard(cardElement, index) {
        if (userDrawnCards.length >= 4) return;

        // 隨機綁定一張偉特塔羅牌，並決定正逆位
        let pool = [...tarotDeck];
        let randomTarot = pool[Math.floor(Math.random() * pool.length)];
        let ori = Math.random() > 0.5 ? '正位' : '逆位';

        userDrawnCards.push({
            ...randomTarot,
            orientation: ori
        });

        // 隱藏該張被抽起的牌
        cardElement.classList.add('selected-drawn');
        
        let count = userDrawnCards.length;
        document.getElementById('drawCount').innerText = count;

        if (count < 4) {
            document.getElementById('stepHint').innerText = stepHints[count];
        } else {
            // 四張牌全抽滿，直接進場排盤解密
            document.getElementById('stepHint').innerText = "✨ 契合成功，正在為您開啟天機大盤...";
            setTimeout(executeFinalDivination, 600);
        }
    }

    function calculateLifePathNumber(dateStr) {
        if (!dateStr) return 1;
        let sum = dateStr.replace(/-/g, '').split('').reduce((acc, num) => acc + parseInt(num), 0);
        while (sum > 9) { sum = sum.toString().split('').reduce((acc, num) => acc + parseInt(num), 0); }
        return sum;
    }

    function getBaziAndWuxing(dateStr) {
        if (!dateStr) return { dayMaster: "木", baziStr: "甲子年", counts: { '木': 2, '火': 1, '土': 2, '金': 0, '水': 1 }, missing: ['金'] };
        const dateObj = new Date(dateStr);
        const year = dateObj.getFullYear(), month = dateObj.getMonth() + 1, day = dateObj.getDate();
        const yIdx = (year - 4) % 60;
        const yearTG = tgArr[yIdx % 10], yearDZ = dzArr[yIdx % 12];
        const baziStr = `${yearTG}${yearDZ}年 🔱`;
        return { dayMaster: tgElements[yearTG]||'木', baziStr: baziStr, counts: { '木': 2, '火': 1, '土': 1, '金': 1, '水': 1 }, missing: [] };
    }

    function executeFinalDivination() {
        const name = document.getElementById('username').value;
        const gender = document.getElementById('gender').value;
        const birthDate = document.getElementById('birthDate').value;
        const birthTime = document.getElementById('birthTime').value;
        const type = document.getElementById('divinationType').value;
        const question = document.getElementById('question').value;
        const loveSubType = type === '感情' ? document.querySelector('input[name="loveSubType"]:checked').value : '';

        const lifeNum = calculateLifePathNumber(birthDate);
        const baziData = getBaziAndWuxing(birthDate);

        const cardTags = ["過去 ． 經歷現形", "現在 ． 局勢透視", "未來 ． 契機演變", "結局 ． 天機終啟"];

        // 建立 4 張牌陣排版
        let arrayHTML = '<div class="array-display-container">';
        userDrawnCards.forEach((card, idx) => {
            let revClass = card.orientation === '逆位' ? 'reversed-visual' : '';
            let isConclusion = idx === 3 ? 'conclusion-tag' : '';
            arrayHTML += `
                <div class="array-card-item">
                    <span class="array-card-tag ${isConclusion}">${cardTags[idx]}</span>
                    <div class="waite-tarot-card-body ${revClass}">
                        <img src="${card.img}" alt="${card.name}">
                    </div>
                    <div class="array-card-name">${card.name} (${card.orientation})</div>
                </div>`;
        });
        arrayHTML += '</div>';

        // 雙人合盤衍生判定（如有選擇）
        let partnerHTML = '';
        if (type === '感情' && loveSubType === '雙人合盤') {
            partnerHTML = `
                <div class="divination-card" style="border-left: 4px solid var(--red-alert); background: #FCF5F5;">
                    <div class="card-meta"><span class="match-badge">💞 雙人宿命合盤速配共振</span></div>
                    <p style="font-size:0.9rem;"><strong>合盤終極裁決：</strong> 對方元神與您的時空結局牌【${userDrawnCards[3].name}】產生了隱秘交織。速配指數高達 <strong>88%</strong>。過去的糾葛在結局牌的引導下，將在未來三個月迎來關鍵跨越。</p>
                </div>`;
        }

        // 整合核心多層解讀報告
        let htmlContent = `
            <div style="text-align: center; margin-bottom: 24px; font-size: 0.9rem; color: var(--brown-accent);">
                <strong>緣主：</strong> ${name} (${gender}) ． <strong>範疇：</strong> 【${type}${loveSubType?' - '+loveSubType:''}】<br>
                <strong>訴求驗證：</strong> 「${question || '近三個月整體大運觀測'}」
            </div>

            <!-- 聖三角+結局牌陣顯化 -->
            ${arrayHTML}

            ${partnerHTML}

            <!-- 四層時空論斷 -->
            <div class="divination-card">
                <div class="card-meta">
                    <span class="tarot-badge">聖三角時空大對位</span>
                    <span class="ziwei-badge">本命日元：${baziData.dayMaster}命</span>
                </div>

                <div class="analysis-block">
                    <div class="analysis-subtitle">⏳ 【過去軸】（${userDrawnCards[0].name} ${userDrawnCards[0].orientation}）</div>
                    <div class="analysis-text">這代表你之前在此事上面臨的因果土壤。牌面元素為「${userDrawnCards[0].element}」，暗示過去的某些執念或環境波動，為你種下了當前的心理局勢。</div>
                </div>

                <div class="analysis-block">
                    <div class="analysis-subtitle">👁️ 【現在軸】（${userDrawnCards[1].name} ${userDrawnCards[1].orientation}）</div>
                    <div class="analysis-text">當下核心癥結透視。此時此刻你正處於能量交接點，需要融合生命靈數 ${lifeNum} 號人的專屬智慧，才能看清眼前的迷霧。</div>
                </div>

                <div class="analysis-block">
                    <div class="analysis-subtitle">🚀 【未來軸】（${userDrawnCards[2].name} ${userDrawnCards[2].orientation}）</div>
                    <div class="analysis-text">即將在 30-60 天內展現的局勢。未來的風向將倒向「${userDrawnCards[2].element}」四元素陣營，不論正逆位，都將強烈引動你本命的發展契機。</div>
                </div>

                <div class="analysis-block" style="background: var(--pink-bg); padding: 15px; border-radius: 12px;">
                    <div class="analysis-subtitle" style="color: var(--red-alert);">🏆 【核心結局 ． 破局牌】（${userDrawnCards[3].name} ${userDrawnCards[3].orientation}）</div>
                    <div class="analysis-text" style="border-left-color: var(--red-alert);"><strong>宇宙在此給出最終定調：</strong>不論過程如何迂迴，這張牌指明了此事的最終歸宿。它呼應了你的願望，給予你最大的啟示。${userDrawnCards[3].orientation==='正位'?'順應天機大膽前行，結果必有顯化。':'逆位暗示需先妥協、放下內耗，方能迎來真正的涅槃。'}</div>
                </div>
            </div>

            <div style="text-align: center; font-size: 0.8rem; color: var(--brown-accent); margin-top: 15px;">
                * 3+1時空流轉牌陣已定，願緣主心納乾坤，福慧雙修 *
            </div>`;

        document.getElementById('ritualSection').style.display = 'none';
        const resultBox = document.getElementById('resultSectionBox');
        document.getElementById('resultContent').innerHTML = htmlContent;
        resultBox.style.display = 'block';
        resultBox.scrollIntoView({ behavior: 'smooth' });
    }
</script>
