<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多維複合命盤 ． 78張時空塔羅巨幅上弧居中版</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght=400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #FDFBF7;
            --cream-light: #F7F3EB;
            --cream-dark: #EADBC8;
            --brown-text: #4A3E3D;
            --brown-accent: #8C786E;
            --white: #FFFFFF;
            --gold: #C5A880;
            --sage: #A39389;
            --red-alert: #C86B5D;
            --pink-bg: #FAF2F2;
            --pink-border: #E8C5C5;
            --dark-gold: #AA8C60;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Noto Serif TC', serif, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--brown-text);
            line-height: 1.8;
            padding: 20px 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 850px;
            background: var(--white);
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 10px 30px rgba(140, 120, 110, 0.08);
            border: 1px solid var(--cream-light);
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 10px 0;
        }

        header h1 {
            font-size: 2rem;
            color: var(--brown-text);
            letter-spacing: 4px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .title-divider {
            width: 80px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin: 0 auto 16px auto;
            position: relative;
        }
        .title-divider::after {
            content: "✦";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 0.6rem;
            color: var(--gold);
            background-color: var(--white);
            padding: 0 4px;
        }

        header p {
            font-size: 0.95rem;
            color: var(--brown-accent);
            letter-spacing: 1.5px;
            line-height: 1.8;
            max-width: 600px;
            margin: 0 auto;
            font-weight: 500;
        }

        .form-section-title {
            font-size: 0.95rem;
            font-weight: bold;
            color: var(--brown-text);
            margin: 15px 0 10px 0;
            padding-bottom: 5px;
            border-bottom: 1px solid var(--cream-dark);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-row {
            display: flex;
            gap: 15px;
        }

        .form-row .form-group {
            flex: 1;
        }

        label {
            display: block;
            font-size: 0.85rem;
            margin-bottom: 8px;
            font-weight: bold;
            color: var(--brown-accent);
        }

        input[type="text"], input[type="date"], select, textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--cream-dark);
            border-radius: 12px;
            background-color: var(--bg-color);
            color: var(--brown-text);
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--brown-accent);
            box-shadow: 0 0 0 3px rgba(140, 120, 110, 0.15);
        }

        textarea {
            resize: none;
            height: 90px;
        }

        .sub-type-container {
            display: none;
            background: var(--bg-color);
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid var(--cream-dark);
            margin-top: 10px;
        }

        .radio-group {
            display: flex;
            gap: 20px;
        }

        .radio-label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
            cursor: pointer;
            color: var(--brown-text);
            margin-bottom: 0;
        }

        .radio-label input[type="radio"] {
            accent-color: var(--red-alert);
        }

        .partner-info-card {
            display: none;
            background-color: var(--pink-bg);
            border: 1px solid var(--pink-border);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 20px;
        }

        .quick-btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 8px;
        }

        .tag-btn {
            background-color: var(--cream-light);
            border: 1px solid transparent;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            color: var(--brown-text);
            transition: all 0.2s;
        }

        .tag-btn.active, .tag-btn:hover {
            background-color: var(--brown-accent);
            color: var(--white);
        }

        .submit-btn {
            width: 100%;
            background-color: var(--brown-accent);
            color: var(--white);
            border: none;
            padding: 16px;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 2px;
            margin-top: 15px;
        }

        /* 🔮 78張大卡牌、完美上弧形抽卡欄位 */
        .ritual-section {
            display: none;
            text-align: center;
            margin-top: 35px;
            padding: 35px 0 15px 0;
            background: var(--cream-light);
            border-radius: 24px;
            border: 1px dashed var(--brown-accent);
            overflow: hidden;
        }

        .ritual-title {
            font-size: 1.1rem;
            color: var(--brown-text);
            margin-bottom: 5px;
            font-weight: bold;
            padding: 0 20px;
        }

        .ritual-steps-hint {
            font-size: 1.25rem;
            color: var(--red-alert);
            margin-bottom: 20px;
            font-weight: bold;
            letter-spacing: 1px;
            padding: 0 20px;
        }

        .scroll-deck-wrapper {
            width: 100%;
            overflow-x: auto;
            overflow-y: hidden;
            padding: 80px 120px 50px 120px; 
            margin: 15px 0;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }

        .scroll-deck-wrapper::-webkit-scrollbar {
            display: none;
        }

        .scroll-deck-container {
            display: flex;
            width: max-content;
            align-items: flex-end; 
            height: 340px; 
            position: relative;
            margin: 0 auto; 
        }

        .ritual-card {
            flex-shrink: 0;
            width: 150px;  
            height: 255px; 
            background: linear-gradient(135deg, #2E2423 0%, #140D0C 100%);
            border: 3px solid var(--gold); 
            border-radius: 16px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            transform: rotate(var(--rot)) translateY(var(--ty));
            transform-origin: center bottom; 
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.2, 1), box-shadow 0.3s ease, border-color 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            margin-left: -75px; 
        }

        .ritual-card:first-child {
            margin-left: 0;
        }

        .ritual-card::before {
            content: "🔱";
            color: var(--gold);
            font-size: 2.2rem; 
            opacity: 0.75;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }

        .ritual-card:hover {
            transform: rotate(var(--rot)) translateY(calc(var(--ty) - 60px)) scale(1.15);
            box-shadow: 0 25px 50px rgba(197, 168, 128, 0.7); 
            border-color: var(--white);
            z-index: 9999; 
        }

        .ritual-card.selected-drawn {
            visibility: hidden;
            pointer-events: none;
        }

        .shuffling-text {
            display: block;
            margin-top: 15px;
            font-size: 0.88rem;
            color: var(--brown-accent);
            font-style: italic;
            padding: 0 20px;
        }

        /* 解盤展現區 */
        .result-section {
            display: none;
            margin-top: 40px;
            padding-top: 30px;
            border-top: 2px dashed var(--cream-dark);
        }

        .result-title {
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 25px;
            color: var(--brown-text);
            letter-spacing: 2px;
            font-weight: 700;
        }

        .array-display-container {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 35px;
        }

        .array-card-item {
            flex: 1;
            text-align: center;
        }

        .array-card-tag {
            font-size: 0.8rem;
            font-weight: bold;
            color: var(--white);
            background: var(--brown-accent);
            padding: 4px 8px;
            border-radius: 4px;
            display: inline-block;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        .array-card-tag.conclusion-tag {
            background: var(--red-alert);
        }

        .waite-tarot-card-body {
            width: 100%;
            height: 220px;
            background: #1A1211;
            border: 3px solid var(--gold);
            border-radius: 12px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.15);
            overflow: hidden;
            transition: transform 0.5s ease;
        }

        .waite-tarot-card-body img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .waite-tarot-card-body.reversed-visual {
            transform: rotate(180deg);
        }

        .array-card-name {
            font-size: 0.85rem;
            font-weight: bold;
            margin-top: 6px;
            color: var(--brown-text);
        }

        .divination-card {
            background: var(--cream-light);
            border-radius: 18px;
            padding: 30px;
            margin-bottom: 25px;
            box-shadow: inset 0 0 20px rgba(140, 120, 110, 0.03);
            border: 1px solid rgba(234, 219, 200, 0.6);
        }

        .card-meta {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--cream-dark);
        }

        .tarot-badge { background: var(--brown-accent); color: var(--white); padding: 4px 14px; border-radius: 6px; font-size: 0.8rem; font-weight: bold;}
        .wuxing-badge { background: var(--dark-gold); color: var(--white); padding: 4px 14px; border-radius: 6px; font-size: 0.8rem; font-weight: bold;}
        .lack-badge { background: var(--red-alert); color: var(--white); padding: 4px 14px; border-radius: 6px; font-size: 0.8rem; font-weight: bold;}

        .analysis-block { margin-bottom: 30px; text-align: justify; }
        .analysis-subtitle { font-weight: bold; color: var(--brown-text); margin-bottom: 10px; font-size: 1.05rem; display: flex; align-items: center; gap: 6px; }
        .analysis-text { font-size: 0.95rem; color: #4A3E3D; padding-left: 20px; border-left: 3px solid var(--cream-dark); line-height: 1.8; }
        
        .core-conclusion-card {
            background: linear-gradient(130deg, #FAF2F2 0%, #F5E6E6 100%); 
            padding: 25px; 
            border-radius: 16px;
            border: 1px solid var(--pink-border);
        }

        .wuxing-grid-box {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            text-align: center;
            margin: 15px 0;
        }
        .wuxing-item {
            background: var(--white);
            padding: 8px;
            border-radius: 8px;
            border: 1px solid var(--cream-dark);
            font-size: 0.85rem;
        }
        .wuxing-item.highlight {
            border-color: var(--red-alert);
            background: #FFF5F5;
        }

        @media (max-width: 600px) {
            .form-row { flex-direction: column; gap: 0; }
            .container { padding: 25px 20px; }
            .array-display-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
            .waite-tarot-card-body { height: 160px; }
            header h1 { font-size: 1.6rem; }
            header p { font-size: 0.85rem; }
            .ritual-card { width: 110px; height: 187px; margin-left: -55px; }
            .ritual-card::before { font-size: 1.6rem; }
            .scroll-deck-container { height: 260px; }
            .scroll-deck-wrapper { padding: 60px 50px 30px 50px; }
            .wuxing-grid-box { grid-template-columns: 1fr 1fr 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>請訴說你的願望</h1>
        <div class="title-divider"></div>
        <p>改變思想，命運就會跟著改變，一切的發生都是最好的安排。</p>
    </header>

    <form id="oracleForm" onsubmit="startRitual(event)">
        <div class="form-section-title">👤 您的個人資料（本命盤根基）</div>
        <div class="form-row">
            <div class="form-group">
                <label for="username">您的姓名</label>
                <input type="text" id="username" placeholder="請輸入姓名" required>
            </div>
            <div class="form-group">
                <label for="gender">您的性別</label>
                <select id="gender" required>
                    <option value="男">男</option>
                    <option value="女">女</option>
                </select>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="birthDate">出生日期（陽曆）</label>
                <input type="date" id="birthDate" required>
            </div>
            <div class="form-group">
                <label for="birthTime">出生時辰</label>
                <select id="birthTime" required>
                    <option value="不知道時辰">不知道時辰（由命理靈感定盤）</option>
                    <option value="子時 (23:00-01:00)">子時 (23:00-01:00)</option>
                    <option value="丑時 (01:00-03:00)">丑時 (01:00-03:00)</option>
                    <option value="寅時 (03:00-05:00)">寅時 (03:00-05:00)</option>
                    <option value="卯時 (05:00-07:00)">卯時 (05:00-07:00)</option>
                    <option value="辰時 (07:00-09:00)">辰時 (07:00-09:00)</option>
                    <option value="巳時 (09:00-11:00)">巳時 (09:00-11:00)</option>
                    <option value="午時 (11:00-13:00)">午時 (11:00-13:00)</option>
                    <option value="未時 (13:00-15:00)">未時 (13:00-15:00)</option>
                    <option value="申時 (15:00-17:00)">申時 (15:00-17:00)</option>
                    <option value="酉時 (17:00-19:00)">酉時 (17:00-19:00)</option>
                    <option value="戌時 (19:00-21:00)">戌時 (19:00-21:00)</option>
                    <option value="亥時 (21:00-23:00)">亥時 (21:00-23:00)</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>想諮詢的命理範疇</label>
            <div class="quick-btn-group">
                <button type="button" class="tag-btn active" onclick="selectType('事業', this)">💼 事業</button>
                <button type="button" class="tag-btn" onclick="selectType('感情', this)">❤️ 感情</button>
                <button type="button" class="tag-btn" onclick="selectType('健康', this)">🌿 健康</button>
                <button type="button" class="tag-btn" onclick="selectType('學業', this)">🎓 學業</button>
                <button type="button" class="tag-btn" onclick="selectType('偏財', this)">🪙 偏財</button>
                <button type="button" class="tag-btn" onclick="selectType('近三個月整體運勢', this)">✨ 近三個月整體運勢</button>
            </div>
            <input type="hidden" id="divinationType" value="事業">

            <div class="sub-type-container" id="loveSubContainer">
                <label style="color: var(--red-alert); font-size: 0.8rem;">請選擇感情諮詢模式：</label>
                <div class="radio-group">
                    <label class="radio-label"><input type="radio" name="loveSubType" value="雙人合盤" checked onclick="togglePartnerCard(true)"> 💞 雙人合盤</label>
                    <label class="radio-label"><input type="radio" name="loveSubType" value="單純算感情運勢" onclick="togglePartnerCard(false)"> 🌹 單純算感情運勢</label>
                </div>
            </div>
        </div>

        <div class="partner-info-card" id="partnerCard">
            <div class="form-section-title" style="color: var(--red-alert); border-bottom-color: var(--pink-border); margin-top:0;">💞 他/她的個人資料</div>
            <div class="form-row">
                <div class="form-group">
                    <label for="partnerName" style="color: var(--red-alert);">對方姓名</label>
                    <input type="text" id="partnerName" placeholder="請輸入對方姓名">
                </div>
                <div class="form-group">
                    <label for="partnerGender" style="color: var(--red-alert);">對方性別</label>
                    <select id="partnerGender">
                        <option value="女">女</option>
                        <option value="男">男</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="partnerBirthDate" style="color: var(--red-alert);">對方生日（陽曆）</label>
                    <input type="date" id="partnerBirthDate">
                </div>
                <div class="form-group">
                    <label for="partnerBirthTime" style="color: var(--red-alert);">對方時辰</label>
                    <select id="partnerBirthTime">
                        <option value="不知道時辰">不知道時辰</option>
                        <option value="子時 (23:00-01:00)">子時</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="form-group" id="questionField">
            <label for="question">您心中的具體問題</label>
            <textarea id="question" placeholder="請詳細訴說你的願望與困惑..."></textarea>
        </div>

        <button type="submit" class="submit-btn" id="initBtn">開始占卜</button>
    </form>

    <!-- 🔮 78張大卡牌抽卡區 -->
    <div class="ritual-section" id="ritualSection">
        <p class="ritual-title">🔮 命運羅盤已依您的磁場推開 78 葉天機</p>
        <div class="ritual-steps-hint" id="stepHint">請憑直覺抽取第 1 張牌：【代表過去】</div>
        
        <div class="scroll-deck-wrapper">
            <div class="scroll-deck-container" id="cardContainer"></div>
        </div>
        <span class="shuffling-text">—— 左右滑動命運弧形卷軸，當前已抽取 <span id="drawCount">0</span> / 4 張卡牌 ——</span>
    </div>

    <!-- 最終解盤結果 -->
    <div class="result-section" id="resultSectionBox">
        <h2 class="result-title">⚜️ 時空宿命多維複合大解盤報告 ⚜️</h2>
        <div id="resultContent"></div>
    </div>
</div>

<script>
    const tarotDeck = [
        { name: "愚者", element: "風", img: "https://upload.wikimedia.org/wikipedia/commons/0/0b/RWS_Tarot_00_Fool.jpg" },
        { name: "魔術師", element: "風", img: "https://upload.wikimedia.org/wikipedia/commons/d/de/RWS_Tarot_01_Magician.jpg" },
        { name: "女祭司", element: "水", img: "https://upload.wikimedia.org/wikipedia/commons/8/88/RWS_Tarot_02_High_Priestess.jpg" },
        { name: "女皇", element: "土", img: "https://upload.wikimedia.org/wikipedia/commons/d/d2/RWS_Tarot_03_Empress.jpg" },
        { name: "皇帝", element: "火", img: "https://upload.wikimedia.org/wikipedia/commons/c/c3/RWS_Tarot_04_Emperor.jpg" },
        { name: "教皇", element: "土", img: "https://upload.wikimedia.org/wikipedia/commons/8/8d/RWS_Tarot_05_Hierophant.jpg" },
        { name: "戀人", element: "風", img: "https://upload.wikimedia.org/wikipedia/commons/3/3a/RWS_Tarot_06_Lovers.jpg" },
        { name: "戰車", element: "水", img: "https://upload.wikimedia.org/wikipedia/commons/9/9b/RWS_Tarot_07_Chariot.jpg" },
        { name: "力量", element: "火", img: "https://upload.wikimedia.org/wikipedia/commons/f/f5/RWS_Tarot_08_Strength.jpg" },
        { name: "隱者", element: "土", img: "https://upload.wikimedia.org/wikipedia/commons/4/4d/RWS_Tarot_09_Hermit.jpg" },
        { name: "命運之輪", element: "火", img: "https://upload.wikimedia.org/wikipedia/commons/3/3c/RWS_Tarot_10_Wheel_of_Fortune.jpg" },
        { name: "正義", element: "風", img: "https://upload.wikimedia.org/wikipedia/commons/e/e0/RWS_Tarot_11_Justice.jpg" },
        { name: "倒吊人", element: "水", img: "https://upload.wikimedia.org/wikipedia/commons/2/2b/RWS_Tarot_12_Hanged_Man.jpg" },
        { name: "死神", element: "水", img: "https://upload.wikimedia.org/wikipedia/commons/d/d7/RWS_Tarot_13_Death.jpg" },
        { name: "節制", element: "火", img: "https://upload.wikimedia.org/wikipedia/commons/f/f8/RWS_Tarot_14_Temperance.jpg" },
        { name: "惡魔", element: "土", img: "https://upload.wikimedia.org/wikipedia/commons/5/55/RWS_Tarot_15_Devil.jpg" },
        { name: "高塔", element: "火", img: "https://upload.wikimedia.org/wikipedia/commons/5/53/RWS_Tarot_16_Tower.jpg" },
        { name: "星星", element: "風", img: "https://upload.wikimedia.org/wikipedia/commons/d/db/RWS_Tarot_17_Star.jpg" },
        { name: "月亮", element: "水", img: "https://upload.wikimedia.org/wikipedia/commons/7/7f/RWS_Tarot_18_Moon.jpg" },
        { name: "太陽", element: "火", img: "https://upload.wikimedia.org/wikipedia/commons/1/17/RWS_Tarot_19_Sun.jpg" },
        { name: "審判", element: "火", img: "https://upload.wikimedia.org/wikipedia/commons/d/dd/RWS_Tarot_20_Judgement.jpg" },

    function startRitual(event) {
        event.preventDefault();
        userDrawnCards = [];

        document.getElementById('stepHint').innerText = stepHints[0];
        
        const container = document.getElementById('cardContainer');
        container.innerHTML = '';

        const totalCards = 78; 

        for (let i = 0; i < totalCards; i++) {
            const cardOpt = document.createElement('div');
            cardOpt.className = 'ritual-card';
            cardOpt.setAttribute('onclick', `pickCard(this, ${i})`);

            let mid = (totalCards - 1) / 2; 
            let diff = i - mid; 
            let deg = diff * 0.65; 
            let translateY = Math.abs(diff) * 0.75; 

            cardOpt.style.setProperty('--rot', `${deg}deg`);
            cardOpt.style.setProperty('--ty', `${translateY}px`);

            container.appendChild(cardOpt);
        }

        document.getElementById('resultSectionBox').style.display = 'none';
        document.getElementById('ritualSection').scrollIntoView({ behavior: 'smooth' });

    function pickCard(cardElement, index) {
        if (userDrawnCards.length >= 4) return;

        let pool = [...tarotDeck];
        userDrawnCards.forEach(drawn => {
            pool = pool.filter(c => c.name !== drawn.name);
        });

        let randomTarot = pool[Math.floor(Math.random() * pool.length)];
        let ori = Math.random() > 0.5 ? '正位' : '逆位';

        userDrawnCards.push({
            ...randomTarot,
            orientation: ori
        });

        cardElement.classList.add('selected-drawn');
        let count = userDrawnCards.length;
        document.getElementById('drawCount').innerText = count;

        if (count < 4) {
            document.getElementById('stepHint').innerText = stepHints[count];
        } else {
            document.getElementById('stepHint').innerText = "✨ 78葉宇宙意識契合成功，大師正在為您進行多維天機合盤演算...";

    }

    function calculateLifePathNumber(dateStr) {
        if (!dateStr) return 5;
        let sum = dateStr.replace(/-/g, '').split('').reduce((acc, num) => acc + parseInt(num), 0);
        while (sum > 9) { sum = sum.toString().split('').reduce((acc, num) => acc + parseInt(num), 0); }
        return sum;
    }

    function getDetailedBaziMatrix(dateStr, timeStr) {
        if (!dateStr) return { main: '木', count: { '木': 2, '火': 2, '土': 2, '金': 1, '水': 1 }, lack: [] };
        
        const dateObj = new Date(dateStr);
        const year = dateObj.getFullYear();
        const month = dateObj.getMonth() + 1;
        const day = dateObj.getDate();

        let yIdx = (year - 4) % 60;
        let mIdx = (month + 12) % 12;
        let dIdx = (day + 30) % 60;
        let tIdx = timeStr.charCodeAt(0) % 12;

        let baziElements = [
            tgElements[tgArr[yIdx % 10]], dzElements[dzArr[yIdx % 12]],
            tgElements[tgArr[mIdx % 10]], dzElements[dzArr[mIdx % 12]],
            tgElements[tgArr[dIdx % 10]], dzElements[dzArr[dIdx % 12]],
            tgElements[tgArr[tIdx % 10]], dzElements[dzArr[tIdx % 12]]
        ];

        let count = { '金': 0, '木': 0, '水': 0, '火': 0, '土': 0 };
        baziElements.forEach(e => { if(e) count[e]++; });

        // 隨機動態模擬本命盤五行殘缺，增加準確感
        const keys = Object.keys(count);
        const randomLackKey = keys[Math.floor((dateObj.getTime() % keys.length))];
        count[randomLackKey] = 0;

        let maxCount = -1, mainWuxing = '木';
        Object.keys(count).forEach(k => {
            if(count[k] > maxCount) { maxCount = count[k]; mainWuxing = k; }
        });

        let lack = [];
        Object.keys(count).forEach(k => { if(count[k] === 0) lack.push(k); });

        return { main: mainWuxing, count: count, lack: lack };
    }

    function getZiweiStar(lifeNum, mainWuxing) {
        const stars = {
            '木': ['天機星', '紫微星', '太陰星'],
            '火': ['太陽星', '廉貞星', '七殺星'],
            '土': ['天府星', '天梁星', '左輔星'],
            '金': ['武曲星', '七殺星', '擎羊星'],
            '水': ['巨門星', '破軍星', '天同星']
        };
        let pool = stars[mainWuxing] || stars['木'];
        return pool[lifeNum % pool.length];
    }
