<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>請說出你的願望</title>
    <!-- Google Fonts 引入美型繁體字體 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght=400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #FDFBF7;
            --cream-light: #F7F3EB;
            --cream-dark: #EADBC8;
            --brown-text: #4A3E3D;
            --brown-accent: #8C786E;
            --white: #FFFFFF;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Noto Serif TC', serif, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--brown-text);
            line-height: 1.6;
            padding: 20px 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 650px;
            background: var(--white);
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 10px 30px rgba(140, 120, 110, 0.1);
            border: 1px solid var(--cream-light);
        }

        header {
            text-align: center;
            margin-bottom: 35px;
        }

        header h1 {
            font-size: 1.8rem;
            color: var(--brown-text);
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        header p {
            font-size: 0.9rem;
            color: var(--brown-accent);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-row {
            display: flex;
            gap: 15px;
        }

        .form-row .form-group {
            flex: 1;
        }

        label {
            display: block;
            font-size: 0.85rem;
            margin-bottom: 8px;
            font-weight: bold;
            color: var(--brown-accent);
        }

        input[type="text"], input[type="date"], select, textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--cream-dark);
            border-radius: 12px;
            background-color: var(--bg-color);
            color: var(--brown-text);
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--brown-accent);
            box-shadow: 0 0 0 3px rgba(140, 120, 110, 0.15);
        }

        textarea {
            resize: none;
            height: 90px;
        }

        .quick-btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 8px;
        }

        .tag-btn {
            background-color: var(--cream-light);
            border: 1px solid transparent;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            color: var(--brown-text);
            transition: all 0.2s;
        }

        .tag-btn.active, .tag-btn:hover {
            background-color: var(--brown-accent);
            color: var(--white);
        }

        .submit-btn {
            width: 100%;
            background-color: var(--brown-accent);
            color: var(--white);
            border: none;
            padding: 16px;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 2px;
            margin-top: 15px;
            transition: background 0.3s ease;
        }

        .submit-btn:hover {
            background-color: #766359;
        }

        /* 預測結果區塊 */
        .result-section {
            display: none;
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px dashed var(--cream-dark);
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-title {
            text-align: center;
            font-size: 1.3rem;
            margin-bottom: 25px;
            color: var(--brown-text);
            position: relative;
        }

        .result-title::after {
            content: '';
            display: block;
            width: 40px;
            height: 2px;
            background: var(--brown-accent);
            margin: 8px auto 0;
        }

        .divination-card {
            background: var(--cream-light);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .card-meta {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .tarot-badge {
            background: var(--brown-accent);
            color: var(--white);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
        }

        .ziwei-badge {
            background: #A39389;
            color: var(--white);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
        }

        .analysis-text {
            font-size: 0.95rem;
            white-space: pre-line;
            text-align: justify;
        }

        .advice-box {
            background: #F0EAE1;
            border-left: 4px solid var(--brown-accent);
            padding: 15px;
            border-radius: 0 12px 12px 0;
            font-size: 0.9rem;
            margin-top: 15px;
        }

        /* 手機板防擠壓優化 */
        @media (max-width: 480px) {
            .form-row {
                flex-direction: column;
                gap: 0;
            }
            .container {
                padding: 25px 20px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>請說出你的願望</h1>
        <p>心念即流年 ． 萬物皆有靈應</p>
    </header>

    <form id="oracleForm" onsubmit="generateDestiny(event)">
        <div class="form-row">
            <div class="form-group">
                <label for="username">您的姓名</label>
                <input type="text" id="username" placeholder="請輸入姓名" required>
            </div>
            <div class="form-group">
                <label for="gender">您的性別</label>
                <select id="gender" required>
                    <option value="男">男</option>
                    <option value="女">女</option>
                </select>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="birthDate">出生日期（陽曆）</label>
                <input type="date" id="birthDate" required>
            </div>
            <div class="form-group">
                <label for="birthTime">出生時辰</label>
                <select id="birthTime" required>
                    <option value="不知道時辰">不知道時辰（由命理靈感定盤）</option>
                    <option value="子時 (23:00-01:00)">子時 (23:00-01:00)</option>
                    <option value="丑時 (01:00-03:00)">丑時 (01:00-03:00)</option>
                    <option value="寅時 (03:00-05:00)">寅時 (03:00-05:00)</option>
                    <option value="卯時 (05:00-07:00)">卯時 (05:00-07:00)</option>
                    <option value="辰時 (07:00-09:00)">辰時 (07:00-09:00)</option>
                    <option value="巳時 (09:00-11:00)">巳時 (09:00-11:00)</option>
                    <option value="午時 (11:00-13:00)">午時 (11:00-13:00)</option>
                    <option value="未時 (13:00-15:00)">未時 (13:00-15:00)</option>
                    <option value="申時 (15:00-17:00)">申時 (15:00-17:00)</option>
                    <option value="酉時 (17:00-19:00)">酉時 (17:00-19:00)</option>
                    <option value="戌時 (19:00-21:00)">戌時 (19:00-21:00)</option>
                    <option value="亥時 (21:00-23:00)">亥時 (21:00-23:00)</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>想諮詢的命理範疇</label>
            <div class="quick-btn-group">
                <button type="button" class="tag-btn active" onclick="selectType('事業', this)">💼 事業</button>
                <button type="button" class="tag-btn" onclick="selectType('感情', this)">❤️ 感情</button>
                <button type="button" class="tag-btn" onclick="selectType('健康', this)">🌿 健康</button>
                <button type="button" class="tag-btn" onclick="selectType('學業', this)">🎓 學業</button>
                <button type="button" class="tag-btn" onclick="selectType('偏財', this)">🪙 偏財</button>
                <button type="button" class="tag-btn" onclick="selectType('近三個月整體運勢', this)">✨ 近三個月整體運勢</button>
            </div>
            <input type="hidden" id="divinationType" value="事業">
        </div>

        <div class="form-group" id="questionField">
            <label for="question">您心中的具體問題（請說出你的願望）</label>
            <textarea id="question" placeholder="例如：近期換工作會順利嗎？請訴說你的願望與困惑..."></textarea>
        </div>

        <button type="submit" class="submit-btn">洗牌、排盤並融合解讀</button>
    </form>

    <!-- 結果輸出 -->
    <div class="result-section" id="resultSection">
        <h2 class="result-title">雙效複合解盤結果</h2>
        <div id="resultContent"></div>
    </div>
</div>

    const tgElements = { '甲': '木', '乙': '木', '丙': '火', '丁': '火', '戊': '土', '己': '土', '庚': '金', '辛': '金', '壬': '水', '癸': '水' };

        document.getElementById('divinationType').value = type;
        const buttons = document.querySelectorAll('.tag-btn');
        buttons.forEach(btn => btn.classList.remove('active'));
        element.classList.add('active');

        const questionField = document.getElementById('questionField');
        const questionInput = document.getElementById('question');
        
        if (type === '近三個月整體運勢') {
            questionField.style.display = 'none';

            '偏財': {
                '正位': `金錢能量池中，【${tarotName}（正位）】注入了「${tarotElem}」的富足養分，與你的財帛五行及日元「${baziMain}」產生了【${interaction}】。暗示你近期的財務直覺相當敏銳，在投資理財上容易有非預期性的好消息，或是平時累積的福報在此時轉化為物質回報。`,
                '逆位': `偏財庫此時開出【${tarotName}（逆位）】。當「${tarotElem}」元素呈現流失，與你的「${baziMain}」氣場產生【${interaction}】的漏財點。近期切記不可聽信來路不明的內部消息，亦不宜盲目跟風跟投，同時要控制好自己的衝動消費慾望。`
            },
            '整體運勢': {
                '正位': `近三個月的命運齒輪隨之轉動，【${tarotName}（正位）】的主導能量「${tarotElem}」與你的八字全局產生【${interaction}】的大流動。這是一個破局與擴展的時期，過去停滯不前的阻礙會悄然化解，新的合作機會、人際關係或環境變動會主動邀請你加入。`,
                '逆位': `未來三個月的運勢在【${tarotName}（逆位）】的洗禮下，呈現「${tarotElem}」的沉澱期，與八字交會出【${interaction}】。這段時間命運在提醒你進行內部整理。不要急著向外開疆闢土，反而是要修補舊有計畫的漏洞，潛龍勿用，蓄勢待發。`
            }
        };

        const categoryKey = category === '近三個月整體運勢' ? '整體運勢' : category;
        const mainDesc = templates[categoryKey][orientation];

        // 客製化專屬大師指引建議
        let advice = "";
        if (orientation === '正位') {
            advice = `順應「${tarotElem}-${baziMain}」的${interaction}之勢，此時應借力使力，主動向世界表達你的意願，切忌過度猶豫而錯失良機。`;
        } else {
            advice = `由於目前呈現${interaction}的拉扯，建議您在未來一段時間內「內斂守成」。把發言權和決定權先放慢半拍，多聽少說，自然能化煞為吉。`;
        }

        return { desc: mainDesc, advice: advice };
    }

    // 模擬八字排盤邏輯（根據陽曆日期與時辰推算簡單的字根）
    function getBaziProfile(dateStr, timeStr) {
        if (!dateStr) return { yearGz: "甲子", dayMasterElem: "木", baziStr: "甲子年 丙寅月 戊戌日" };
        
        const dateObj = new Date(dateStr);
        const yIdx = (dateObj.getFullYear() - 4) % 60;
        const mIdx = (dateObj.getMonth() + dateObj.getDate()) % 12;
        const dIdx = (dateObj.getDate() + dateObj.getFullYear()) % 10;
        
        const yearGz = tgArr[yIdx % 10] + dzArr[yIdx % 12];
        const monthGz = tgArr[(yIdx * 2 + 2) % 10] + dzArr[mIdx];
        const dayGz = tgArr[dIdx] + dzArr[(dIdx + 2) % 12];
        
        const dayMaster = tgArr[dIdx];
        const dayMasterElem = tgElements[dayMaster];

        return {
            yearGz: yearGz,
            dayMasterElem: dayMasterElem,
            baziStr: `${yearGz}年 ${monthGz}月 ${dayGz}日`
        };
    }

    function generateDestiny(event) {
        event.preventDefault();

        // 讀取表單資料
        const name = document.getElementById('username').value;
        const gender = document.getElementById('gender').value;
        const birthDate = document.getElementById('birthDate').value;
        const birthTime = document.getElementById('birthTime').value;
        const type = document.getElementById('divinationType').value;
        const question = document.getElementById('question').value;

        // 1. 八字核心氣場演算
        const baziInfo = getBaziProfile(birthDate, birthTime);

        // 2. 78張塔羅牌隨機洗牌抽牌 + 正逆位判定
        const randomCardIdx = Math.floor(Math.random() * tarotDeck.length);
        const selectedCard = tarotDeck[randomCardIdx];
        const orientation = Math.random() > 0.5 ? '正位' : '逆位';

        // 3. 獲取深度交融解析
        const resultData = getDynamicAnalysis(type, selectedCard.name, orientation, selectedCard.element, baziInfo);

        // 4. 不知時辰貼心提醒
        let timeDisplay = birthTime;
        let blindTimeNotice = "";
        if (birthTime === "不知道時辰") {
            timeDisplay = "時辰不詳";
            blindTimeNotice = "<br><span style='color: #bfa393; font-size: 0.85rem;'>⚠️ 註：因出生時辰未明，系統已自動為您啟動八字日柱元神與全牌組進行天干地支氣場對位。</span>";
        } else {
            timeDisplay = birthTime.split(' ')[0];
        }

        // 5. 渲染結果介面
        let htmlContent = `
            <div style="text-align: center; margin-bottom: 20px; font-size: 0.9rem; color: var(--brown-accent);">
                <strong>緣主尊稱：</strong> ${name} (${gender}) ． <strong>先天命盤：</strong> ${baziInfo.baziStr} ${timeDisplay}<br>
                <strong>所訴願望：</strong> ${type === '近三個月整體運勢' ? '探問百事，祈請三月批導' : '「' + question + '」'}
                ${blindTimeNotice}
            </div>

            <div class="divination-card">
                <div class="card-meta">
                    <span class="tarot-badge">心靈覺察</span>
                    <span class="ziwei-badge">五行對位</span>
                </div>
                <div style="font-weight: bold; margin-bottom: 15px; color: var(--brown-accent); font-size: 1.1rem; border-bottom: 1px dashed var(--cream-dark); padding-bottom: 8px;">
                    🔮 當前抽得：${selectedCard.name} (${orientation}) <span style="font-size:0.85rem; font-weight:normal; color:#A39389;">[牌面元素：${selectedCard.element} ｜ 本命元神：${baziInfo.dayMasterElem}]</span>
                </div>
                <div class="analysis-text">
                    緣主吉祥。為您悉心探測天地磁場的流轉。將您本命八字的元神氣場，與當前隨機顯現的塔羅全牌組進行深度交融與解盤：
                    
                    ${resultData.desc}
                </div>
                <div class="advice-box">
                    <strong>💡 大師給您的願望指引：</strong><br>
                    ${resultData.advice}
                </div>
            </div>
            
            <div style="text-align: center; font-size: 0.8rem; color: var(--brown-accent); margin-top: 15px;">
                * 命盤流轉，心念即流年。願望已悉，祝願您心想事成，福慧雙修 *
            </div>
        `;

        const resultSection = document.getElementById('resultSection');
        const resultContent = document.getElementById('resultContent');
        
        resultContent.innerHTML = htmlContent;
        resultSection.style.display = 'block';

        // 平滑滾動至結果畫面
        resultSection.scrollIntoView({ behavior: 'smooth' });
    }
</script>
