<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雙效複合 ． 紫微八字塔羅靈數大運盤（雙人速配版）</title>
    <!-- Google Fonts 引入美型繁體字體 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght=400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #FDFBF7;
            --cream-light: #F7F3EB;
            --cream-dark: #EADBC8;
            --brown-text: #4A3E3D;
            --brown-accent: #8C786E;
            --white: #FFFFFF;
            --gold: #C5A880;
            --sage: #A39389;
            --red-alert: #C86B5D;
            --pink-bg: #FAF2F2;
            --pink-border: #E8C5C5;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Noto Serif TC', serif, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--brown-text);
            line-height: 1.8;
            padding: 20px 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 750px;
            background: var(--white);
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 10px 30px rgba(140, 120, 110, 0.08);
            border: 1px solid var(--cream-light);
        }

        header {
            text-align: center;
            margin-bottom: 35px;
        }

        header h1 {
            font-size: 1.8rem;
            color: var(--brown-text);
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        header p {
            font-size: 0.9rem;
            color: var(--brown-accent);
        }

        .form-section-title {
            font-size: 0.95rem;
            font-weight: bold;
            color: var(--brown-text);
            margin: 15px 0 10px 0;
            padding-bottom: 5px;
            border-bottom: 1px solid var(--cream-dark);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-row {
            display: flex;
            gap: 15px;
        }

        .form-row .form-group {
            flex: 1;
        }

        label {
            display: block;
            font-size: 0.85rem;
            margin-bottom: 8px;
            font-weight: bold;
            color: var(--brown-accent);
        }

        input[type="text"], input[type="date"], select, textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--cream-dark);
            border-radius: 12px;
            background-color: var(--bg-color);
            color: var(--brown-text);
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--brown-accent);
            box-shadow: 0 0 0 3px rgba(140, 120, 110, 0.15);
        }

        textarea {
            resize: none;
            height: 90px;
        }

        /* 對方資料卡片樣式 */
        .partner-info-card {
            display: none;
            background-color: var(--pink-bg);
            border: 1px solid var(--pink-border);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 20px;
            animation: slideDown 0.4s ease forwards;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .quick-btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 8px;
        }

        .tag-btn {
            background-color: var(--cream-light);
            border: 1px solid transparent;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            color: var(--brown-text);
            transition: all 0.2s;
        }

        .tag-btn.active, .tag-btn:hover {
            background-color: var(--brown-accent);
            color: var(--white);
        }

        .submit-btn {
            width: 100%;
            background-color: var(--brown-accent);
            color: var(--white);
            border: none;
            padding: 16px;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 2px;
            margin-top: 15px;
            transition: background 0.3s ease;
        }

        .submit-btn:hover {
            background-color: #766359;
        }

        /* 儀式感抽卡互動區 */
        .ritual-section {
            display: none;
            text-align: center;
            margin-top: 30px;
            padding: 30px 20px;
            background: var(--cream-light);
            border-radius: 16px;
            border: 1px dashed var(--brown-accent);
        }

        .ritual-title {
            font-size: 1.05rem;
            color: var(--brown-text);
            margin-bottom: 15px;
            letter-spacing: 1px;
            line-height: 1.6;
        }

        .card-deck {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 30px 0;
            perspective: 1000px;
        }

        .ritual-card {
            width: 85px;
            height: 145px;
            background: linear-gradient(135deg, #4A3E3D 0%, #2A201F 100%);
            border: 2px solid var(--gold);
            border-radius: 10px;
            cursor: pointer;
            position: relative;
            box-shadow: 0 6px 15px rgba(0,0,0,0.18);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ritual-card::before {
            content: "🔱";
            color: var(--gold);
            font-size: 1.4rem;
            opacity: 0.8;
        }

        .ritual-card:hover {
            transform: translateY(-15px) rotate(3deg) scale(1.05);
            box-shadow: 0 15px 25px rgba(197, 168, 128, 0.45);
            border-color: var(--white);
        }

        .shuffling-text {
            font-size: 0.85rem;
            color: var(--brown-accent);
            font-style: italic;
            letter-spacing: 1px;
        }

        /* 預測結果區塊 */
        .result-section {
            display: none;
            margin-top: 40px;
            padding-top: 30px;
            border-top: 2px dashed var(--cream-dark);
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-title {
            text-align: center;
            font-size: 1.35rem;
            margin-bottom: 25px;
            color: var(--brown-text);
            letter-spacing: 2px;
        }

        /* 經典偉特牌實體圖像 */
        .waite-tarot-container {
            width: 160px;
            margin: 0 auto 20px;
            perspective: 1000px;
        }

        .waite-tarot-card-body {
            width: 100%;
            height: 275px;
            background: #1A1211;
            border: 5px solid var(--gold);
            border-radius: 14px;
            box-shadow: 0 12px 35px rgba(0,0,0,0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .waite-tarot-card-body img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .waite-tarot-card-body.reversed-visual {
            transform: rotate(180deg);
            box-shadow: 0 -12px 35px rgba(0,0,0,0.3);
        }

        .divination-card {
            background: var(--cream-light);
            border-radius: 18px;
            padding: 26px;
            margin-bottom: 22px;
            border: 1px solid rgba(140, 120, 110, 0.05);
        }

        .card-meta {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 18px;
        }

        .tarot-badge { background: var(--brown-accent); color: var(--white); padding: 4px 12px; border-radius: 6px; font-size: 0.75rem; font-weight: bold;}
        .ziwei-badge { background: var(--sage); color: var(--white); padding: 4px 12px; border-radius: 6px; font-size: 0.75rem; font-weight: bold;}
        .numerology-badge { background: var(--gold); color: var(--brown-text); padding: 4px 12px; border-radius: 6px; font-size: 0.75rem; font-weight: bold;}
        .bazi-element-badge { background: #4A3E3D; color: #FFF; padding: 4px 12px; border-radius: 6px; font-size: 0.75rem; font-weight: bold;}
        .bazi-missing-badge { background: var(--red-alert); color: #FFF; padding: 4px 12px; border-radius: 6px; font-size: 0.75rem; font-weight: bold;}
        .match-badge { background: #C86B5D; color: #FFF; padding: 4px 12px; border-radius: 6px; font-size: 0.75rem; font-weight: bold;}

        /* 五行能量分佈條樣式 */
        .wuxing-chart {
            margin: 15px 0;
            background: #FFF;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--cream-dark);
        }
        .wuxing-row {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }
        .wuxing-name {
            width: 50px;
            font-size: 0.85rem;
            font-weight: bold;
        }
        .wuxing-bar-bg {
            flex: 1;
            background: #EEE;
            height: 12px;
            border-radius: 6px;
            overflow: hidden;
            margin: 0 10px;
        }
        .wuxing-bar-fill {
            height: 100%;
            border-radius: 6px;
            width: 0%;
            transition: width 1s ease;
        }

        /* 速配指數大圓環樣式 */
        .match-score-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            margin: 15px 0;
            background: #FFF;
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--pink-border);
        }
        .match-circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: radial-gradient(#FFF 60%, transparent 61%), conic-gradient(var(--red-alert) var(--score-p, 0%), #EEE 0%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            font-weight: bold;
            color: var(--red-alert);
            box-shadow: 0 4px 10px rgba(200,107,93,0.15);
        }
        .match-verdict {
            flex: 1;
            font-size: 0.9rem;
            color: var(--brown-text);
            line-height: 1.7;
        }

        .analysis-block {
            margin-bottom: 25px;
            text-align: justify;
        }

        .analysis-subtitle {
            font-weight: bold;
            color: var(--brown-text);
            margin-bottom: 8px;
            font-size: 0.98rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .analysis-text {
            font-size: 0.95rem;
            color: #5A4E4D;
            padding-left: 20px;
            border-left: 2px solid var(--cream-dark);
            line-height: 1.8;
        }

        .advice-box {
            background: #F4EFE6;
            border-radius: 14px;
            padding: 22px;
            margin-top: 25px;
        }

        .advice-title {
            font-size: 1rem;
            font-weight: bold;
            color: var(--brown-text);
            margin-bottom: 15px;
            border-bottom: 1px dashed var(--brown-accent);
            padding-bottom: 6px;
        }

        .advice-item {
            margin-bottom: 18px;
        }

        .advice-item:last-child {
            margin-bottom: 0;
        }

        .advice-item-title {
            font-weight: bold;
            font-size: 0.9rem;
            color: var(--brown-accent);
            margin-bottom: 4px;
        }

        .advice-item-text {
            font-size: 0.9rem;
            color: var(--brown-text);
            text-align: justify;
        }

        @media (max-width: 480px) {
            .form-row { flex-direction: column; gap: 0; }
            .container { padding: 25px 20px; }
            .card-deck { gap: 8px; }
            .ritual-card { width: 70px; height: 120px; }
            .analysis-text { padding-left: 12px; }
            .match-score-container { flex-direction: column; text-align: center; gap: 15px; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>請說出你的願望</h1>
        <p>八字五行 ． 紫微靈數 ． 雙人宿命速配 ． 經典偉特塔羅大運盤</p>
    </header>

    <!-- 諮詢表單 -->
    <form id="oracleForm" onsubmit="startRitual(event)">
        
        <div class="form-section-title">👤 您的個人資料（本命盤根基）</div>
        <div class="form-row">
            <div class="form-group">
                <label for="username">您的姓名</label>
                <input type="text" id="username" placeholder="請輸入姓名" required>
            </div>
            <div class="form-group">
                <label for="gender">您的性別</label>
                <select id="gender" required>
                    <option value="男">男</option>
                    <option value="女">女</option>
                </select>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="birthDate">出生日期（陽曆）</label>
                <input type="date" id="birthDate" required>
            </div>
            <div class="form-group">
                <label for="birthTime">出生時辰</label>
                <select id="birthTime" required>
                    <option value="不知道時辰">不知道時辰（由命理靈感定盤）</option>
                    <option value="子時 (23:00-01:00)">子時 (23:00-01:00)</option>
                    <option value="丑時 (01:00-03:00)">丑時 (01:00-03:00)</option>
                    <option value="寅時 (03:00-05:00)">寅時 (03:00-05:00)</option>
                    <option value="卯時 (05:00-07:00)">卯時 (05:00-07:00)</option>
                    <option value="辰時 (07:00-09:00)">辰時 (07:00-09:00)</option>
                    <option value="巳時 (09:00-11:00)">巳時 (09:00-11:00)</option>
                    <option value="午時 (11:00-13:00)">午時 (11:00-13:00)</option>
                    <option value="未時 (13:00-15:00)">未時 (13:00-15:00)</option>
                    <option value="申時 (15:00-17:00)">申時 (15:00-17:00)</option>
                    <option value="酉時 (17:00-19:00)">酉時 (17:00-19:00)</option>
                    <option value="戌時 (19:00-21:00)">戌時 (19:00-21:00)</option>
                    <option value="亥時 (21:00-23:00)">亥時 (21:00-23:00)</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>想諮詢的命理範疇</label>
            <div class="quick-btn-group">
                <button type="button" class="tag-btn active" onclick="selectType('事業', this)">💼 事業</button>
                <button type="button" class="tag-btn" onclick="selectType('感情', this)">❤️ 感情</button>
                <button type="button" class="tag-btn" onclick="selectType('健康', this)">🌿 健康</button>
                <button type="button" class="tag-btn" onclick="selectType('學業', this)">🎓 學業</button>
                <button type="button" class="tag-btn" onclick="selectType('偏財', this)">🪙 偏財</button>
                <button type="button" class="tag-btn" onclick="selectType('近三個月整體運勢', this)">✨ 近三個月整體運勢</button>
            </div>
            <input type="hidden" id="divinationType" value="事業">
        </div>

        <!-- 感情專屬：對方資料卡片區（動態隱現） -->
        <div class="partner-info-card" id="partnerCard">
            <div class="form-section-title" style="color: var(--red-alert); border-bottom-color: var(--pink-border); margin-top:0;">💞 他/她的個人資料（雙人合盤對位）</div>
            <div class="form-row">
                <div class="form-group">
                    <label for="partnerName" style="color: var(--red-alert);">對方姓名</label>
                    <input type="text" id="partnerName" placeholder="請輸入對方姓名">
                </div>
                <div class="form-group">
                    <label for="partnerGender" style="color: var(--red-alert);">對方性別</label>
                    <select id="partnerGender">
                        <option value="女">女</option>
                        <option value="男">男</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="partnerBirthDate" style="color: var(--red-alert);">對方生日（陽曆）</label>
                    <input type="date" id="partnerBirthDate">
                </div>
                <div class="form-group">
                    <label for="partnerBirthTime" style="color: var(--red-alert);">對方時辰</label>
                    <select id="partnerBirthTime">
                        <option value="不知道時辰">不知道時辰（由命理靈感定盤）</option>
                        <option value="子時 (23:00-01:00)">子時 (23:00-01:00)</option>
                        <option value="丑時 (01:00-03:00)">丑時 (01:00-03:00)</option>
                        <option value="寅時 (03:00-05:00)">寅時 (03:00-05:00)</option>
                        <option value="卯時 (05:00-07:00)">卯時 (05:00-07:00)</option>
                        <option value="辰時 (07:00-09:00)">辰時 (07:00-09:00)</option>
                        <option value="巳時 (09:00-11:00)">巳時 (09:00-11:00)</option>
                        <option value="午時 (11:00-13:00)">午時 (11:00-13:00)</option>
                        <option value="未時 (13:00-15:00)">未時 (13:00-15:00)</option>
                        <option value="申時 (15:00-17:00)">申時 (15:00-17:00)</option>
                        <option value="酉時 (17:00-19:00)">酉時 (17:00-19:00)</option>
                        <option value="戌時 (19:00-21:00)">戌時 (19:00-21:00)</option>
                        <option value="亥時 (21:00-23:00)">亥時 (21:00-23:00)</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="form-group" id="questionField">
            <label for="question">您心中的具體問題</label>
            <textarea id="question" placeholder="例如：近期換工作會順利嗎？請訴說你的願望與困惑..."></textarea>
        </div>

        <button type="submit" class="submit-btn" id="initBtn">進入靜心抽卡儀式</button>
    </form>

    <!-- 儀式感抽卡互動區 -->
    <div class="ritual-section" id="ritualSection">
        <p class="ritual-title">🔮 牌組已為您洗就。請閉上雙眼，排除心中雜念，默誦您的願望三遍。<br>隨後，憑第一直覺挑選一張與您當前靈魂頻率產生最強烈感應的牌卡：</p>
        <div class="card-deck">
            <div class="ritual-card" onclick="executeDivination(1)"></div>
            <div class="ritual-card" onclick="executeDivination(2)"></div>
            <div class="ritual-card" onclick="executeDivination(3)"></div>
            <div class="ritual-card" onclick="executeDivination(4)"></div>
        </div>
        <span class="shuffling-text">—— 靈氣與天機匯聚中，等待您的抉擇 ——</span>
    </div>

    <!-- 最終解盤結果輸出 -->
    <div class="result-section" id="resultSectionBox">
        <h2 class="result-title">多維度智慧複合解盤報告</h2>
        <div id="resultContent"></div>
    </div>
</div>

<script>
    // 引入經典萊德偉特塔羅牌開源高解析度資料庫
    const tarotDeck = [
        { name: "愚者", element: "風", img: "https://upload.wikimedia.org/wikipedia/commons/0/0b/RWS_Tarot_00_Fool.jpg" },
        { name: "魔術師", element: "風", img: "https://upload.wikimedia.org/wikipedia/commons/d/de/RWS_Tarot_01_Magician.jpg" },
        { name: "女祭司", element: "水", img: "https://upload.wikimedia.org/wikipedia/commons/8/88/RWS_Tarot_02_High_Priestess.jpg" },
        { name: "女皇", element: "土", img: "https://upload.wikimedia.org/wikipedia/commons/d/d2/RWS_Tarot_03_Empress.jpg" },
        { name: "皇帝", element: "火", img: "https://upload.wikimedia.org/wikipedia/commons/c/c3/RWS_Tarot_04_Emperor.jpg" },
        { name: "教皇", element: "土", img: "https://upload.wikimedia.org/wikipedia/commons/8/8d/RWS_Tarot_05_Hierophant.jpg" },
        { name: "戀人", element: "風", img: "https://upload.wikimedia.org/wikipedia/commons/3/3a/RWS_Tarot_06_Lovers.jpg" },
        { name: "戰車", element: "水", img: "https://upload.wikimedia.org/wikipedia/commons/9/9b/RWS_Tarot_07_Chariot.jpg" },
        { name: "力量", element: "火", img: "https://upload.wikimedia.org/wikipedia/commons/f/f5/RWS_Tarot_08_Strength.jpg" },
        { name: "隱者", element: "土", img: "https://upload.wikimedia.org/wikipedia/commons/4/4d/RWS_Tarot_09_Hermit.jpg" },
        { name: "命運之輪", element: "火", img: "https://upload.wikimedia.org/wikipedia/commons/3/3c/RWS_Tarot_10_Wheel_of_Fortune.jpg" },
        { name: "正義", element: "風", img: "https://upload.wikimedia.org/wikipedia/commons/e/e0/RWS_Tarot_11_Justice.jpg" },
        { name: "倒吊人", element: "水", img: "https://upload.wikimedia.org/wikipedia/commons/2/2b/RWS_Tarot_12_Hanged_Man.jpg" },
        { name: "死神", element: "水", img: "https://upload.wikimedia.org/wikipedia/commons/d/d7/RWS_Tarot_13_Death.jpg" },
        { name: "節制", element: "火", img: "https://upload.wikimedia.org/wikipedia/commons/f/f8/RWS_Tarot_14_Temperance.jpg" },
        { name: "惡魔", element: "土", img: "https://upload.wikimedia.org/wikipedia/commons/5/55/RWS_Tarot_15_Devil.jpg" },

    function calculateLifePathNumber(dateStr) {
        if (!dateStr) return 1;
        const nums = dateStr.replace(/-/g, '');
        let sum = 0;
        for (let i = 0; i < nums.length; i++) sum += parseInt(nums[i]);
        while (sum > 9) {
            let temp = 0;
            const sumStr = sum.toString();
            for (let j = 0; j < sumStr.length; j++) temp += parseInt(sumStr[j]);
            sum = temp;
        }
        return sum;
    }

    function getBaziAndWuxing(dateStr) {
        if (!dateStr) return { dayMaster: "木", baziStr: "甲子年 丙寅月 戊戌日", counts: { '木': 2, '火': 1, '土': 2, '金': 0, '水': 1 }, missing: ['金'] };
        
        const dateObj = new Date(dateStr);
        const year = dateObj.getFullYear();
        const month = dateObj.getMonth() + 1;
        const day = dateObj.getDate();

        const yIdx = (year - 4) % 60;
        const mIdx = (month + day) % 12;
        const dIdx = (day + year) % 10;

        const yearTG = tgArr[yIdx % 10];
        const yearDZ = dzArr[yIdx % 12];
        const monthTG = tgArr[(yIdx * 2 + 2) % 10];
        const monthDZ = dzArr[mIdx];
        const dayTG = tgArr[dIdx];
        const dayDZ = dzArr[(dIdx + 2) % 12];

        const dayMasterElem = tgElements[dayTG] || "土";
        const baziStr = `${yearTG}${yearDZ}年 ${monthTG}${monthDZ}月 ${dayTG}${dayDZ}日`;

        let counts = { '木': 0, '火': 0, '土': 0, '金': 0, '水': 0 };
        const elementsInChart = [
            tgElements[yearTG], dzElements[yearDZ],
            tgElements[monthTG], dzElements[monthDZ],
            tgElements[dayTG], dzElements[dayDZ]
        ];

        elementsInChart.forEach(elem => { if(counts[elem] !== undefined) counts[elem]++; });

        let missing = [];
        for (let key in counts) {
            if (counts[key] === 0) missing.push(key);
        }

        return { dayMaster: dayMasterElem, baziStr: baziStr, counts: counts, missing: missing };
    }

    // 雙人合盤速配核心演算矩陣
    function calculateMatchScore(selfBazi, partnerBazi, selfNum, partnerNum) {
        let score = 60; // 基礎緣分分

        // 1. 五行日元生剋契合度
        const selfDM = selfBazi.dayMaster;
        const partDM = partnerBazi.dayMaster;
        
        const compatibility = {
            '木': { '火': 15, '水': 15, '土': 5, '木': 8, '金': -5 },
            '火': { '土': 15, '木': 15, '金': 5, '火': 8, '水': -5 },
            '土': { '金': 15, '火': 15, '水': 5, '土': 8, '木': -5 },
            '金': { '水': 15, '土': 15, '木': 5, '金': 8, '火': -5 },
            '水': { '木': 15, '金': 15, '火': 5, '水': 8, '土': -5 }
        };
        score += (compatibility[selfDM][partDM] || 10);

        // 2. 五行互補機制 (對方有沒有你缺的五行)
        selfBazi.missing.forEach(m => {
            if (partnerBazi.counts[m] > 0) score += 6; // 互補加分
        });
        partnerBazi.missing.forEach(m => {
            if (selfBazi.counts[m] > 0) score += 6;
        });

        // 3. 生命靈數共振
        if (selfNum === partnerNum) {
            score += 8; // 同頻共振
        } else if ((selfNum + partnerNum) % 2 === 0) {
            score += 5; // 溫和相協
        }

        if (score > 99) score = 99;
        if (score < 45) score = 45;
        return score;
    }

                    <div class="analysis-block">
                        <div class="analysis-subtitle">🧬 第二層：【骨架格】靈數課題與天賦映射</div>
                        <div class="analysis-text">${resultData.bone}</div>
                    </div>
                    <div class="analysis-block">
                        <div class="analysis-subtitle">🌊 第三層：【氣場流】五行元素與元神碰撞</div>
                        <div class="analysis-text">${resultData.stream}</div>
                    </div>
                    <div class="analysis-block">
                        <div class="analysis-subtitle">⏳ 第四層：【時空局】時局演變與未來軌跡</div>
                        <div class="analysis-text">${resultData.time || '未來三個月內，大運命盤的能量將逐步將您引向正確的顯化軌道。'}</div>
                    </div>
                `}

                <!-- 三維立體化指引建議 -->
                <div class="advice-box">
                    <div class="advice-title">💡 破局與改運處方指南</div>
                    
                    <div class="advice-item">
                        <div class="advice-item-title">🧘 經緯一：【心法修持】（心理能量調頻）</div>
                        <div class="advice-item-text">${resultData.mind}</div>
                    </div>
                    
                    <div class="advice-item">
                        <div class="advice-item-title">📿 經緯二：【先天解藥】（缺失五行專屬外在補運法）</div>
                        <div class="advice-item-text" style="color:#A04030;">
                            ${missingActionText}
                        </div>
                    </div>
                </div>
            </div>
            
            <div style="text-align: center; font-size: 0.8rem; color: var(--brown-accent); margin-top: 15px; letter-spacing: 1px;">
                * 命盤流轉，心念即流年。願望已悉，祝願您心想事成，福慧雙修 *
            </div>
        `;

        document.getElementById('ritualSection').style.display = 'none';
        const resultSectionBox = document.getElementById('resultSectionBox');
        const resultContent = document.getElementById('resultContent');
        
        resultContent.innerHTML = htmlContent;
        resultSectionBox.style.display = 'block';
        resultSectionBox.scrollIntoView({ behavior: 'smooth' });
    }
</script>
